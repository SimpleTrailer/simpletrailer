<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="192x192" href="/logo-icon.png?v=10" />
  <link rel="apple-touch-icon" href="/logo-icon.png?v=10" />
  <title>CRM – SimpleTrailer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0E1117; --s1:#161B22; --s2:#1C232E; --s3:#222B38;
      --border:#2A323E; --border2:#36404E;
      --text:#E8EEF5; --muted:#8C99AB; --dim:#5E6B7D;
      --orange:#E85D00; --orange-soft:rgba(232,93,0,.14);
      --green:#2ECC71; --green-soft:rgba(46,204,113,.14);
      --red:#FF5D5D; --red-soft:rgba(255,93,93,.13);
      --yellow:#F5A623; --yellow-soft:rgba(245,166,35,.14);
      --blue:#4DA3FF; --blue-soft:rgba(77,163,255,.14);
      --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
      --radius:14px; --shadow:0 6px 24px rgba(0,0,0,.35);
    }
    html,body{overflow-x:clip;max-width:100%;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100dvh;font-size:15px;line-height:1.5;}
    .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
    .num{font-variant-numeric:tabular-nums;}
    a{color:inherit;}
    button{font-family:inherit;cursor:pointer;}
    ::-webkit-scrollbar{height:6px;width:6px;}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;}

    /* ── LOGIN ── */
    #loginView{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:34px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);}
    .login-card h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
    .login-card .sub{color:var(--muted);font-size:.86rem;margin-bottom:22px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:.74rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .field input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s;}
    .field input:focus{border-color:var(--orange);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;font-weight:700;font-size:.92rem;padding:12px 18px;transition:transform .08s,opacity .15s,background .15s;}
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--orange);color:#fff;width:100%;}
    .btn-ghost{background:var(--s2);border:1px solid var(--border2);color:var(--text);}
    .login-err{color:var(--red);font-size:.84rem;margin-top:10px;min-height:1em;}

    /* ── SHELL ── */
    #app{display:none;}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(14,17,23,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;}
    .brand{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;}
    .brand span{color:var(--orange);}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:5px 9px;border-radius:20px;}
    .live-dot .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(46,204,113,.6);animation:pulse 2s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,.5)}70%{box-shadow:0 0 0 7px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}
    .icon-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;}

    /* tab strip */
    .tabs{position:sticky;top:54px;z-index:40;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{flex:0 0 auto;background:transparent;border:1px solid transparent;color:var(--muted);padding:8px 14px;border-radius:10px;font-size:.88rem;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px;}
    .tab.active{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}
    .tab .badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:800;border-radius:10px;padding:1px 6px;}

    main{padding:16px 14px 90px;max-width:1100px;margin:0 auto;}
    .tabpane{display:none;animation:fade .25s ease;}
    .tabpane.active{display:block;}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* ── COMPONENTS ── */
    .sect-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:22px 2px 10px;}
    .sect-title:first-child{margin-top:4px;}
    .grid{display:grid;gap:10px;}
    .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
    .kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
    .kpi .label{font-size:.74rem;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .kpi .val{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;}
    .kpi .val.sm{font-size:1.2rem;}
    .kpi .sub{font-size:.74rem;color:var(--dim);margin-top:3px;}

    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border);width:100%;text-align:left;background:transparent;border-left:none;border-right:none;border-top:none;color:var(--text);transition:background .12s;}
    .row:last-child{border-bottom:none;}
    .row.clickable{cursor:pointer;}
    .row.clickable:hover{background:var(--s2);}
    .row .av{width:38px;height:38px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;color:var(--orange);flex-shrink:0;}
    .row .main{flex:1;min-width:0;}
    .row .t1{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .row .t2{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .row .right{text-align:right;flex-shrink:0;}
    .row .amt{font-weight:800;font-variant-numeric:tabular-nums;}
    .row .chev{color:var(--dim);flex-shrink:0;}

    .pill{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .pill.green{background:var(--green-soft);color:var(--green);}
    .pill.orange{background:var(--orange-soft);color:var(--orange);}
    .pill.red{background:var(--red-soft);color:var(--red);}
    .pill.yellow{background:var(--yellow-soft);color:var(--yellow);}
    .pill.blue{background:var(--blue-soft);color:var(--blue);}
    .pill.grey{background:var(--s3);color:var(--muted);}

    .empty{text-align:center;color:var(--dim);padding:30px 16px;font-size:.88rem;}
    .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .sel{background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:8px 10px;font-size:.82rem;font-weight:600;cursor:pointer;max-width:100%;}
    .search{flex:1;min-width:160px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-size:16px;outline:none;}
    .chip{background:var(--s1);border:1px solid var(--border);color:var(--muted);padding:8px 13px;border-radius:10px;font-size:.82rem;font-weight:600;white-space:nowrap;}
    .chip.active{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}

    /* bars (stats) */
    .bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
    .bar-row .bl{width:70px;font-size:.78rem;color:var(--muted);flex-shrink:0;}
    .bar-track{flex:1;height:10px;background:var(--s3);border-radius:6px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),#ff8a3d);border-radius:6px;transition:width .6s ease;}
    .bar-row .bv{width:54px;text-align:right;font-size:.78rem;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0;}
    .bar-row .bv.wide{width:96px;}
    .bar-row[title]{cursor:default;}
    .bar-row .bl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bar-row .bl.wideL{width:112px;}
    /* charts */
    .chart-svg{width:100%;height:auto;display:block;overflow:visible;}
    .viz-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;}
    .donut-legend{display:flex;flex-direction:column;gap:2px;}
    .lg-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.84rem;}
    .lg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
    .lg-name{flex:1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lg-val{font-weight:700;font-variant-numeric:tabular-nums;}
    /* trend badge (vs. Vorperiode) */
    .trend{display:inline-flex;align-items:center;gap:3px;font-size:.72rem;font-weight:800;padding:2px 7px;border-radius:20px;font-variant-numeric:tabular-nums;white-space:nowrap;}
    .trend.up{background:var(--green-soft);color:var(--green);}
    .trend.down{background:var(--red-soft);color:var(--red);}
    .trend.flat{background:var(--s3);color:var(--muted);}
    .kpi .label .trend{margin-left:auto;}
    /* heatmap (Wochentag × Tageszeit) */
    .hm{width:100%;border-collapse:separate;border-spacing:3px;}
    .hm th{font-size:.64rem;font-weight:700;color:var(--dim);padding:2px;text-align:center;}
    .hm td.hm-row{font-size:.68rem;font-weight:700;color:var(--muted);text-align:right;padding-right:6px;white-space:nowrap;width:1%;}
    .hm td.hm-cell{height:26px;border-radius:5px;text-align:center;font-size:.64rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;transition:transform .1s ease;}
    .hm td.hm-cell:hover{transform:scale(1.12);outline:1.5px solid var(--orange);}
    .hm-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:8px;font-size:.68rem;color:var(--dim);}
    .hm-legend i{width:16px;height:10px;border-radius:2px;display:inline-block;}
    /* Belegungs-Kalender */
    .cal{border-collapse:separate;border-spacing:2px;}
    .cal-name{font-size:.74rem;font-weight:700;color:var(--text);white-space:nowrap;padding-right:8px;text-align:right;position:sticky;left:0;background:var(--s1);z-index:1;}
    .cal-h{font-size:.66rem;color:var(--dim);text-align:center;min-width:26px;line-height:1.25;padding-bottom:4px;}
    .cal-h.we{color:var(--orange);}
    .cal-c{width:26px;height:28px;border-radius:4px;background:var(--s3);}
    .cal-c.we{background:var(--s2);}
    .cal-c.busy{cursor:pointer;}
    .cal-c.busy:hover{outline:2px solid var(--text);outline-offset:-1px;}
    /* interaktiver Chart-Hover (Crosshair + Tooltip) */
    .chart-wrap{position:relative;}
    .chart-tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-118%);background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:6px 9px;font-size:.76rem;font-weight:600;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.45);transition:opacity .1s ease;z-index:5;}
    .chart-tip .tv{font-weight:800;color:var(--orange);}

    /* ── DETAIL PANEL (slide-in) ── */
    #scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:90;}
    #scrim.open{opacity:1;pointer-events:auto;}
    #panel{position:fixed;z-index:100;background:var(--s1);border-left:1px solid var(--border);box-shadow:var(--shadow);
      top:0;right:0;height:100dvh;width:min(460px,100%);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;}
    #panel.open{transform:none;}
    #sheet{position:fixed;z-index:100;left:0;right:0;bottom:0;background:var(--s1);border-top:1px solid var(--border);border-radius:18px 18px 0 0;box-shadow:var(--shadow);transform:translateY(110%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:6px 12px calc(16px + env(safe-area-inset-bottom));max-height:70vh;overflow-y:auto;}
    #sheet.open{transform:none;}
    #sheet .sheet-handle{width:42px;height:4px;background:var(--border2);border-radius:4px;margin:6px auto 8px;}
    .panel-head{position:sticky;top:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:15px 16px;}
    .panel-head h2{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
    .panel-body{padding:16px;overflow-y:auto;flex:1;}
    .drow{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem;}
    .drow:last-child{border-bottom:none;}
    .drow .k{color:var(--muted);flex-shrink:0;}
    .drow .v{text-align:right;font-weight:600;word-break:break-word;}
    .dblock{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:4px 14px;margin:12px 0;}
    .dlabel{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:16px 2px 8px;}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
    .photo-cell{margin:0;}
    .photo-cell img{width:100%;height:110px;object-fit:cover;border-radius:10px;border:1px solid var(--border2);cursor:zoom-in;transition:transform .12s ease,border-color .12s ease;display:block;}
    .photo-cell img:hover{transform:scale(1.02);border-color:var(--orange);}
    .photo-cell figcaption{font-size:.66rem;color:var(--dim);margin-top:5px;text-align:center;line-height:1.25;}
    #lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,6,8,.94);align-items:center;justify-content:center;padding:24px;}
    #lightbox.open{display:flex;}
    .lb-stage{margin:0;max-width:min(960px,94vw);max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:12px;}
    .lb-stage img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
    .lb-stage figcaption{color:#e7e7ea;font-size:.9rem;font-weight:600;text-align:center;}
    .lb-count{color:var(--dim);font-weight:500;margin-left:6px;}
    .lb-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:1.1rem;cursor:pointer;}
    .lb-close:hover{background:rgba(255,255,255,.2);}
    .lb-nav{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;padding:0 12px;}
    .lb-arrow{pointer-events:auto;background:rgba(255,255,255,.1);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:1.8rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .lb-arrow:hover{background:rgba(255,255,255,.22);}
    .linkbtn{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:9px 13px;border-radius:10px;font-size:.84rem;font-weight:600;text-decoration:none;margin:4px 6px 4px 0;}
    .linkbtn.orange{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}

    /* bottom nav (mobile) */
    .botnav{display:none;}
    @media(max-width:760px){
      .tabs{display:none;}
      main{padding-bottom:78px;}
      .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(20,25,33,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));justify-content:space-around;}
      .botnav button{background:transparent;border:none;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;font-weight:600;padding:4px 8px;flex:1;position:relative;}
      .botnav button .ic{font-size:1.18rem;}
      .botnav button.active{color:var(--orange);}
      .botnav .nbadge{position:absolute;top:0;right:50%;transform:translateX(14px);background:var(--red);color:#fff;font-size:.55rem;font-weight:800;border-radius:10px;padding:0 5px;}
      #panel{width:100%;border-left:none;}
      .kpi .val{font-size:1.35rem;}
    }
    @media(min-width:761px){ .botnav{display:none;} }
    /* Leaflet in eigenem Stacking-Context (z:0) halten → Karten-Steuerung liegt NICHT mehr über Nav/Panel/Inhalt */
    #flotteMap{position:relative;z-index:0;}
    .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--s2);color:var(--text);}
    .leaflet-container{font-family:var(--sans);}
    .trailer-marker-icon{width:46px;height:42px;position:relative;}
    .trailer-marker-icon .tm-img{position:absolute;bottom:0;left:0;width:100%;height:36px;object-fit:contain;object-position:center bottom;filter:drop-shadow(0 0 1px rgba(0,0,0,.9)) drop-shadow(0 2px 3px rgba(0,0,0,.6));-webkit-user-drag:none;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <h1>Simple<span style="color:var(--orange)">Trailer</span> CRM</h1>
    <div class="sub">Interner Admin-Zugang</div>
    <div class="field"><label>E-Mail</label><input type="email" id="email" autocomplete="username" placeholder="admin@simpletrailer.de" /></div>
    <div class="field"><label>Passwort</label><input type="password" id="password" autocomplete="current-password" placeholder="••••••••" /></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Anmelden</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">Simple<span>Trailer</span> · CRM</div>
    <div class="topbar-right">
      <span class="live-dot" id="liveDot"><span class="pulse"></span><span id="liveCount">–</span> live</span>
      <button class="icon-btn" onclick="openSearch()" title="Suche">⌕</button>
      <button class="icon-btn" onclick="openAlarms()" title="Alarme" style="position:relative">🔔<span class="badge" id="alarmBadge" style="display:none;position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff"></span></button>
      <button class="icon-btn" onclick="loadAll(true)" title="Aktualisieren">⟳</button>
      <button class="icon-btn" onclick="doLogout()" title="Abmelden">⏻</button>
    </div>
  </div>

  <div class="tabs" id="tabStrip"></div>

  <main>
    <div class="tabpane" id="pane-heute"></div>
    <div class="tabpane" id="pane-cockpit"></div>
    <div class="tabpane" id="pane-buchungen"></div>
    <div class="tabpane" id="pane-kunden"></div>
    <div class="tabpane" id="pane-flotte"></div>
    <div class="tabpane" id="pane-kalender"></div>
    <div class="tabpane" id="pane-finanzen"></div>
    <div class="tabpane" id="pane-statistik"></div>
    <div class="tabpane" id="pane-aistab"></div>
    <div class="tabpane" id="pane-rechner"></div>
  </main>

  <nav class="botnav" id="botnav"></nav>
</div>

<!-- DETAIL PANEL -->
<div id="scrim" onclick="closePanel()"></div>
<aside id="panel">
  <div class="panel-head"><h2 id="panelTitle">Detail</h2><button class="icon-btn" onclick="closePanel()">✕</button></div>
  <div class="panel-body" id="panelBody"></div>
</aside>
<div id="sheet"><div class="sheet-handle"></div><div id="sheetBody"></div></div>

<!-- FOTO-LIGHTBOX -->
<div id="lightbox" onclick="if(event.target.id==='lightbox')closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()" aria-label="Schließen">✕</button>
  <div id="lbNav" class="lb-nav">
    <button class="lb-arrow" onclick="lbStep(-1)" aria-label="Zurück">‹</button>
    <button class="lb-arrow" onclick="lbStep(1)" aria-label="Weiter">›</button>
  </div>
  <figure class="lb-stage">
    <img id="lbImg" src="" alt="">
    <figcaption><span id="lbCap"></span> <span id="lbCount" class="lb-count"></span></figcaption>
  </figure>
</div>

<script>
  const SUPABASE_URL  = 'https://zcjlfatuelhkghtdyrqh.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_cX1r2GLuIkxEPIpkFKdXaQ_RtP7eDOf';
  const SESSION_KEY   = 'st_admin_session';

  let authToken = null, _refreshTimer = null;
  const ST = { bookings:[], users:[], notify:[], trailers:[], stats:{}, payCache:{}, analytics:null };
  let currentTab = 'heute';

  /* ── HELPERS ── */
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const safeUrl = u => { u=String(u||''); return /^https?:\/\//i.test(u)?esc(u):''; };
  const eur = n => (Number(n)||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  const fmtDate = iso => iso ? new Date(iso).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '–';
  const fmtDay  = iso => iso ? new Date(iso).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) : '–';
  const telNum = p => String(p||'').replace(/[^\d+]/g,'');
  const waNum  = p => { let s=telNum(p); if(s.startsWith('+'))s=s.slice(1); else if(s.startsWith('00'))s=s.slice(2); else if(s.startsWith('0'))s='49'+s.slice(1); return s; };
  const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
  const initial = s => (String(s||'?').trim()[0]||'?').toUpperCase();
  const isSameDay = (a,b) => a&&b&&new Date(a).toDateString()===new Date(b).toDateString();
  const statusPill = (st, noShow) => {
    if(noShow) return `<span class="pill red">👻 No-Show</span>`;
    const m = { pending:['orange','Ausstehend'], confirmed:['green','Bestätigt'], active:['blue','Aktiv'], returned:['grey','Abgeschlossen'], cancelled:['red','Storniert'] };
    const [c,l] = m[st]||['grey',st||'–']; return `<span class="pill ${c}">${l}</span>`;
  };

  /* ── AUTH (Session-Persistenz + 401-Recovery, wie Haupt-Admin) ── */
  function saveSession(s){try{localStorage.setItem(SESSION_KEY,JSON.stringify(s));}catch(e){}}
  function loadSession(){try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null');}catch(e){return null;}}
  function clearSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}}
  function scheduleRefresh(exp){ if(_refreshTimer)clearTimeout(_refreshTimer); if(!exp)return; const ms=(exp-300)*1000-Date.now(); _refreshTimer=setTimeout(refreshNow,Math.max(5000,Math.min(ms,0x7fffffff))); }
  async function refreshNow(){
    const s=loadSession(); if(!s||!s.refresh_token)return false;
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON},body:JSON.stringify({refresh_token:s.refresh_token})});
      const d=await r.json();
      if(!r.ok||!d.access_token||d.user?.email!=='admin@simpletrailer.de'){clearSession();return false;}
      authToken=d.access_token; saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at,email:d.user.email}); scheduleRefresh(d.expires_at); return true;
    }catch(e){ if(_refreshTimer)clearTimeout(_refreshTimer); _refreshTimer=setTimeout(refreshNow,30000); return false; }
  }
  const _fetch = window.fetch.bind(window);
  window.fetch = async (input,init)=>{
    let res=await _fetch(input,init);
    const url=typeof input==='string'?input:(input&&input.url)||'';
    if(res.status===401&&authToken&&/\/api\//.test(url)){
      if(await refreshNow()){ const ni={...(init||{})}; ni.headers={...((init&&init.headers)||{}),Authorization:`Bearer ${authToken}`}; res=await _fetch(input,ni); }
      else doLogout();
    }
    return res;
  };
  async function doLogin(){
    const email=document.getElementById('email').value.trim(), pass=document.getElementById('password').value;
    const btn=document.getElementById('loginBtn'), err=document.getElementById('loginErr');
    err.textContent=''; btn.disabled=true; btn.textContent='Wird angemeldet…';
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON},body:JSON.stringify({email,password:pass})});
      const d=await r.json(); if(!r.ok)throw new Error(d.error_description||d.msg||'Login fehlgeschlagen');
      if(d.user.email!=='admin@simpletrailer.de')throw new Error('Kein Zugriff auf diesen Bereich.');
      authToken=d.access_token; saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at,email:d.user.email}); scheduleRefresh(d.expires_at); enterApp();
    }catch(e){ err.textContent=e.message; } finally{ btn.disabled=false; btn.textContent='Anmelden'; }
  }
  function doLogout(){ authToken=null; clearSession(); if(_refreshTimer)clearTimeout(_refreshTimer); document.getElementById('app').style.display='none'; document.getElementById('loginView').style.display='flex'; }
  async function tryRestore(){
    const s=loadSession(); if(!s||!s.refresh_token)return;
    const nowSec=Math.floor(Date.now()/1000);
    if(s.access_token&&s.expires_at&&s.expires_at-60>nowSec){authToken=s.access_token;scheduleRefresh(s.expires_at);enterApp();return;}
    if(await refreshNow())enterApp();
  }
  function enterApp(){
    document.getElementById('loginView').style.display='none';
    document.getElementById('app').style.display='block';
    buildNav(); switchTab('heute'); loadAll(); startLive();
  }

  /* ── API ── */
  async function api(section,opts={}){
    const r=await fetch(`/api/admin?section=${section}`,{headers:{Authorization:`Bearer ${authToken}`,...(opts.headers||{})},...opts});
    if(!r.ok) throw new Error('API '+section+' '+r.status);
    return r.json();
  }
  async function loadAll(force){
    try{
      const [data,usersRes,trailersRes]=await Promise.all([
        api('data').catch(()=>({bookings:[],stats:{}})),
        api('users').catch(()=>({users:[],notify:[]})),
        api('trailers').catch(()=>({trailers:[]}))
      ]);
      ST.bookings=data.bookings||[]; ST.stats=data.stats||{};
      ST.users=usersRes.users||[]; ST.notify=usersRes.notify||[];
      ST.trailers=trailersRes.trailers||trailersRes||[];
      ST.analytics=null; // Cockpit beim nächsten Öffnen frisch laden
      renderTab(currentTab); updateBadges();
    }catch(e){ console.error(e); }
  }
  let _liveT=null;
  function startLive(){ const tick=async()=>{ try{const r=await fetch('/api/live-visitors',{headers:{Authorization:`Bearer ${authToken}`}}); const d=await r.json(); document.getElementById('liveCount').textContent=(d.active??d.count??0);}catch(e){} }; tick(); if(_liveT)clearInterval(_liveT); _liveT=setInterval(tick,15000); }

  /* ── NAV ── */
  const TABS=[
    {id:'heute',label:'Heute',ic:'◉'},
    {id:'cockpit',label:'Cockpit',ic:'◎'},
    {id:'buchungen',label:'Buchungen',ic:'▤'},
    {id:'kunden',label:'Kunden',ic:'☻'},
    {id:'flotte',label:'Flotte',ic:'▣'},
    {id:'kalender',label:'Kalender',ic:'⊞'},
    {id:'finanzen',label:'Finanzen',ic:'€'},
    {id:'statistik',label:'Statistik',ic:'▦'},
    {id:'aistab',label:'AI-Stab',ic:'✦'},
    {id:'rechner',label:'Rechner',ic:'∑'},
  ];
  const BOTTOM=['heute','buchungen','kunden','finanzen']; // Mobile-Bottom-Nav (+ Mehr-Sheet)
  function buildNav(){
    document.getElementById('tabStrip').innerHTML=TABS.map(t=>`<button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')"><span>${t.ic}</span>${t.label}<span class="badge" id="tb-${t.id}" style="display:none"></span></button>`).join('');
    let bn=BOTTOM.map(id=>{const t=TABS.find(x=>x.id===id);return `<button data-tab="${id}" onclick="switchTab('${id}')"><span class="ic">${t.ic}</span>${t.label}<span class="nbadge" id="nb-${id}" style="display:none"></span></button>`;}).join('');
    bn+=`<button onclick="openMore()"><span class="ic">⋯</span>Mehr</button>`;
    document.getElementById('botnav').innerHTML=bn;
  }
  function openMore(){
    document.getElementById('sheetBody').innerHTML=TABS.filter(t=>!BOTTOM.includes(t.id)).map(t=>`<button class="row clickable" onclick="closePanel();switchTab('${t.id}')"><div class="av">${t.ic}</div><div class="main"><div class="t1">${t.label}</div></div><span class="chev">›</span></button>`).join('');
    document.getElementById('scrim').classList.add('open'); document.getElementById('sheet').classList.add('open');
  }
  function switchTab(id){
    currentTab=id;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
    document.querySelectorAll('.botnav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
    document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
    document.getElementById('pane-'+id).classList.add('active');
    renderTab(id); window.scrollTo({top:0});
  }
  function renderTab(id){ ({heute:renderHeute,cockpit:renderCockpit,buchungen:renderBuchungen,kunden:renderKunden,flotte:renderFlotte,kalender:renderKalender,finanzen:renderFinanzen,statistik:renderStatistik,aistab:renderAistab,rechner:renderRechner}[id]||(()=>{}))(); }

  function updateBadges(){
    const now=Date.now();
    const alarms = ST.bookings.filter(b=>b.status==='pending'&&(now-new Date(b.created_at).getTime())>3600000).length
      + ST.bookings.filter(b=>b.status==='active'&&b.end_time&&new Date(b.end_time).getTime()<now).length
      + ST.bookings.filter(b=>String(b.late_fee_payment_intent_id||'').startsWith('FAILED')).length;
    ['tb-heute','nb-heute'].forEach(eid=>{const el=document.getElementById(eid);if(el){el.style.display=alarms?'inline-block':'none';el.textContent=alarms;}});
    const ab=document.getElementById('alarmBadge'); if(ab){ab.style.display=alarms?'inline-flex':'none';ab.textContent=alarms;}
  }
  function collectAlarms(){
    const now=Date.now(), a=[];
    ST.bookings.filter(b=>b.status==='pending'&&(now-new Date(b.created_at).getTime())>3600000).forEach(b=>a.push(['red','Seit >1h ausstehend',b]));
    ST.bookings.filter(b=>b.status==='active'&&b.end_time&&new Date(b.end_time).getTime()<now).forEach(b=>a.push(['yellow','Überfällige Rückgabe',b]));
    ST.bookings.filter(b=>String(b.late_fee_payment_intent_id||'').startsWith('FAILED')).forEach(b=>a.push(['red','Verspätungs-Abbuchung fehlgeschlagen',b]));
    return a;
  }
  function openAlarms(){
    const a=collectAlarms();
    const h=a.length?`<div class="card">`+a.map(([c,txt,b])=>`<button class="row clickable" onclick="closePanel();openBooking('${b.id}')"><div class="av" style="color:var(--${c})">!</div><div class="main"><div class="t1">${txt}</div><div class="t2">${esc(b.customer_name||'–')} · ${esc(b.trailers?.name||'')}</div></div><span class="chev">›</span></button>`).join('')+`</div>`:`<div class="empty">Keine offenen Alarme 🎉</div>`;
    openPanel('Alarme ('+a.length+')',h);
  }
  function openSearch(){
    openPanel('Suche','<input class="search" id="globalQ" placeholder="Kunde, Buchung, Anhänger, Telefon…" oninput="doGlobalSearch(this.value)" style="width:100%"><div id="globalRes" style="margin-top:12px"><div class="empty">Tippe, um zu suchen…</div></div>');
    setTimeout(()=>{const el=document.getElementById('globalQ');if(el)el.focus();},120);
  }
  function doGlobalSearch(q){
    const el=document.getElementById('globalRes'); if(!el)return;
    q=(q||'').trim().toLowerCase();
    if(q.length<2){el.innerHTML='<div class="empty">Mindestens 2 Zeichen…</div>';return;}
    const res=[];
    ST.users.filter(u=>(`${u.first_name||''} ${u.last_name||''} ${u.email||''} ${u.phone||''}`).toLowerCase().includes(q)).slice(0,8).forEach(u=>res.push(`<button class="row clickable" onclick="closePanel();openCustomer('${esc(u.email)}')"><div class="av">☻</div><div class="main"><div class="t1">${esc(([u.first_name,u.last_name].filter(Boolean).join(' '))||u.email)}</div><div class="t2">${esc(u.email)} · Kunde</div></div><span class="chev">›</span></button>`));
    ST.bookings.filter(b=>(`${b.customer_name||''} ${b.customer_email||''} ${b.customer_phone||''} ${b.id||''}`).toLowerCase().includes(q)).slice(0,8).forEach(b=>res.push(`<button class="row clickable" onclick="closePanel();openBooking('${b.id}')"><div class="av">▤</div><div class="main"><div class="t1">${esc(b.customer_name||'–')}</div><div class="t2">#${(b.id||'').slice(0,8).toUpperCase()} · ${esc(b.trailers?.name||'')} · Buchung</div></div><span class="chev">›</span></button>`));
    ST.trailers.filter(t=>(`${t.name||''} ${t.license_plate||''}`).toLowerCase().includes(q)).slice(0,5).forEach(t=>res.push(`<button class="row clickable" onclick="closePanel();openTrailer('${esc(t.id||t.name)}')"><div class="av">▣</div><div class="main"><div class="t1">${esc(t.name||'')}</div><div class="t2">Anhänger</div></div><span class="chev">›</span></button>`));
    el.innerHTML=res.length?`<div class="card">`+res.join('')+`</div>`:'<div class="empty">Nichts gefunden.</div>';
  }

  /* ── HEUTE ── */
  function renderHeute(){
    const now=Date.now(), today=new Date();
    const pickups=ST.bookings.filter(b=>isSameDay(b.start_time,today)).sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));
    const returns=ST.bookings.filter(b=>isSameDay(b.end_time,today)).sort((a,b)=>new Date(a.end_time)-new Date(b.end_time));
    const revToday=ST.bookings.filter(b=>isSameDay(b.created_at,today)&&['confirmed','active','returned'].includes(b.status)).reduce((s,b)=>s+(b.total_amount||0),0);
    const alarms=[];
    ST.bookings.filter(b=>b.status==='pending'&&(now-new Date(b.created_at).getTime())>3600000).forEach(b=>alarms.push(['red','Seit >1h ausstehend',b]));
    ST.bookings.filter(b=>b.status==='active'&&b.end_time&&new Date(b.end_time).getTime()<now).forEach(b=>alarms.push(['yellow','Überfällige Rückgabe',b]));
    ST.bookings.filter(b=>String(b.late_fee_payment_intent_id||'').startsWith('FAILED')).forEach(b=>alarms.push(['red','Verspätungsgebühr-Abbuchung fehlgeschlagen',b]));

    let h='';
    h+=`<div class="grid kpis">
      <div class="kpi"><div class="label">Umsatz heute</div><div class="val">${eur(revToday)}</div></div>
      <div class="kpi"><div class="label">Abholungen heute</div><div class="val">${pickups.length}</div></div>
      <div class="kpi"><div class="label">Rückgaben heute</div><div class="val">${returns.length}</div></div>
      <div class="kpi"><div class="label">Umsatz Monat</div><div class="val sm">${eur(ST.stats.revenue_month)}</div></div>
    </div>`;

    h+=`<div id="refundPending"></div>`;
    h+=`<div class="sect-title">⚠️ Sofort prüfen (anklickbar)</div>`;
    h+= alarms.length ? `<div class="card">`+alarms.map(([c,txt,b])=>`
        <button class="row clickable" onclick="openBooking('${b.id}')">
          <div class="av" style="color:var(--${c})">!</div>
          <div class="main"><div class="t1">${txt}</div><div class="t2">${esc(b.customer_name||'–')} · ${esc(b.trailers?.name||'')}</div></div>
          <span class="chev">›</span>
        </button>`).join('')+`</div>`
      : `<div class="card"><div class="empty">Keine offenen Alarme 🎉</div></div>`;

    h+=`<div class="sect-title">📋 Tagesplan heute</div><div id="todoList"><div class="card"><div class="empty">lädt…</div></div></div>`;
    h+=`<div class="sect-title">↑ Abholungen heute</div>`+todayList(pickups,'start_time','Keine Abholungen heute');
    h+=`<div class="sect-title">↓ Rückgaben heute</div>`+todayList(returns,'end_time','Keine Rückgaben heute');
    document.getElementById('pane-heute').innerHTML=h;
    loadTodos(); loadRefundPending();
  }
  async function loadRefundPending(){
    const el=document.getElementById('refundPending'); if(!el)return;
    try{ const d=await api('refund-pending'); const list=d.bookings||[];
      if(!document.getElementById('refundPending'))return;
      if(!list.length){ el.innerHTML=''; return; }
      _lb=list.filter(b=>safeUrl(b.not_drivable_photo_url)).map(b=>({url:safeUrl(b.not_drivable_photo_url),cap:'Nicht fahrtauglich · '+(b.customer_name||'')}));
      const picIdx=u=>_lb.findIndex(p=>p.url===safeUrl(u));
      el.innerHTML=`<div class="sect-title" style="color:var(--red)">🛑 Erstattung freigeben (${list.length}) — Kunde wartet auf Geld</div>`+
        '<div class="card" style="border-color:rgba(255,93,93,.4)">'+list.map(b=>`<div class="row" style="display:block">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><strong>${esc(b.customer_name||'–')}</strong><span style="font-size:.72rem;color:var(--dim)">${b.not_drivable_reported_at?fmtDate(b.not_drivable_reported_at):''}</span></div>
          <div style="font-size:.82rem;color:var(--muted);margin:4px 0">${esc(b.trailers?.name||'')} · ${eur(b.total_amount)} · #${(b.id||'').slice(0,8).toUpperCase()}</div>
          ${b.not_drivable_description?`<div style="font-size:.86rem;margin:6px 0">„${esc(b.not_drivable_description)}"</div>`:''}
          ${safeUrl(b.not_drivable_photo_url)?`<img src="${safeUrl(b.not_drivable_photo_url)}" loading="lazy" onclick="openLightbox(${picIdx(b.not_drivable_photo_url)})" style="width:84px;height:84px;object-fit:cover;border-radius:8px;border:1px solid var(--border2);cursor:zoom-in;margin:4px 0">`:''}
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" style="flex:1;min-width:140px" onclick="decideRefund('${b.id}','approve',${b.total_amount||0},this)">✓ Erstatten (${eur(b.total_amount)})</button>
            <button class="chip" onclick="decideRefund('${b.id}','reject',0,this)">Ablehnen</button>
          </div>
        </div>`).join('')+'</div>';
    }catch(e){ if(el)el.innerHTML=''; }
  }
  async function decideRefund(id,action,amount,btn){
    const msg = action==='approve' ? `Erstattung von ${eur(amount)} FREIGEBEN?\n\nDas Geld wird sofort über Stripe zurückgebucht und der Kunde per Mail informiert.` : 'Erstattungs-Anfrage ABLEHNEN?\n\nDie Buchung bleibt bestehen, kein Geld zurück.';
    if(!confirm(msg))return;
    if(btn){ btn.disabled=true; btn.style.opacity=.6; }
    try{ const r=await fetch('/api/admin?section=approve-refund',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${authToken}`},body:JSON.stringify({booking_id:id,action})}); const d=await r.json(); if(!r.ok)throw new Error(d.error||'Fehler'); await loadAll(); renderHeute(); alert(action==='approve'?'✓ Erstattung freigegeben & Kunde informiert.':'Anfrage abgelehnt.'); }catch(e){ if(btn){ btn.disabled=false; btn.style.opacity=1; } alert('❌ '+e.message);}
  }
  async function loadTodos(){
    const el=document.getElementById('todoList'); if(!el)return;
    try{ const d=await api('daily-briefing'); const items=d.items||[];
      if(!document.getElementById('todoList'))return;
      ST.todos=items;
      el.innerHTML = items.length ? '<div class="card">'+items.map((it,i)=>`<button class="row clickable" onclick="goTodo(${i})"><div class="av" style="color:var(--${it.severity==='red'?'red':'yellow'})">${it.icon||'•'}</div><div class="main"><div class="t1">${esc(it.title||'')}</div><div class="t2" style="white-space:normal">${esc(it.detail||'')}</div></div><span class="chev">›</span></button>`).join('')+'</div>' : '<div class="card"><div class="empty">Nichts Offenes für heute 🎉</div></div>';
    }catch(e){ el.innerHTML='<div class="card"><div class="empty">Tagesplan nicht ladbar.</div></div>'; }
  }
  function goTodo(i){ const it=(ST.todos||[])[i]; if(!it)return; const t=(it.title||'').toLowerCase();
    if(t.includes('pending')){bookFilter='pending';switchTab('buchungen');}
    else if(t.includes('überfällig')||t.includes('ueberf')){bookFilter='active';switchTab('buchungen');}
    else if(t.includes('forderung')){bookFilter='all';switchTab('buchungen');}
    else if(t.includes('insta')||t.includes('content')||t.includes('draft')){switchTab('aistab');}
    else if(t.includes('tüv')||t.includes('tuev')||t.includes('wartung')){switchTab('flotte');}
    else {switchTab('buchungen');}
  }
  function todayList(arr,tf,emptyMsg){
    if(!arr.length)return `<div class="card"><div class="empty">${emptyMsg}</div></div>`;
    return `<div class="card">`+arr.map(b=>`
      <button class="row clickable" onclick="openBooking('${b.id}')">
        <div class="av">${esc(initial(b.customer_name))}</div>
        <div class="main"><div class="t1">${esc(b.customer_name||'–')}</div><div class="t2">${esc(b.trailers?.name||'')} · ${fmtTime(b[tf])} Uhr</div></div>
        <div class="right">${statusPill(b.status,b.no_show)}</div>
      </button>`).join('')+`</div>`;
  }

  /* ── BUCHUNGEN ── */
  let bookFilter='all', bookSearch='', bookTrailer='all', bookSort='created';
  function bookMatches(b){
    if(bookFilter!=='all'&&b.status!==bookFilter)return false;
    if(bookTrailer!=='all'&&(b.trailers?.name||'')!==bookTrailer)return false;
    if(bookSearch){const q=bookSearch.toLowerCase(); if(!((b.customer_name||'').toLowerCase().includes(q)||(b.customer_email||'').toLowerCase().includes(q)||(b.customer_phone||'').toLowerCase().includes(q)||(b.id||'').toLowerCase().includes(q)))return false;}
    return true;
  }
  function renderBuchungen(){
    const filters=[['all','Alle'],['pending','Ausstehend'],['confirmed','Bestätigt'],['active','Aktiv'],['returned','Abgeschlossen'],['cancelled','Storniert']];
    let list=ST.bookings.filter(bookMatches);
    if(bookSort==='start')list.sort((a,b)=>new Date(b.start_time||0)-new Date(a.start_time||0));
    else if(bookSort==='betrag')list.sort((a,b)=>((b.total_amount||0)+(b.late_fee_amount||0))-((a.total_amount||0)+(a.late_fee_amount||0)));
    else list.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
    const trailerNames=[...new Set(ST.bookings.map(b=>b.trailers?.name).filter(Boolean))];

  function exportBookingsCsv(){
    const list=ST.bookings.filter(bookMatches);
    if(!list.length){alert('Keine Buchungen im aktuellen Filter.');return;}
    const q=v=>{v=String(v==null?'':v); if(/^[=+\-@\t\r]/.test(v))v="'"+v; v=v.replace(/"/g,'""'); return /[";\n\r]/.test(v)?`"${v}"`:v;};
    const de=n=>(Number(n)||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
    const head=['Buchung','Kunde','E-Mail','Telefon','Von','Bis','Tarif','Anhänger','Brutto','Netto','MwSt','Schutzpaket','Storno-Gebühr','Verspätung','Status','Stripe-PI'];
    const rows=list.map(b=>{const brutto=(b.total_amount||0)+(b.late_fee_amount||0), netto=brutto/1.19; return [
      (b.id||'').slice(0,8).toUpperCase(), b.customer_name, b.customer_email, b.customer_phone,
      b.start_time?fmtDate(b.start_time):'', b.end_time?fmtDate(b.end_time):'',
      TARIFF_LBL[b.pricing_type]||b.pricing_type||'', b.trailers?.name||'',
      de(brutto), de(netto), de(brutto-netto), de(b.insurance_amount), de(b.cancellation_protection_fee), de(b.late_fee_amount),
      b.status, b.stripe_payment_intent_id||''
    ].map(q).join(';');});
    const csv='﻿'+head.join(';')+'\n'+rows.join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}), url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='simpletrailer-buchungen-'+new Date().toISOString().slice(0,10)+'.csv'; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }

  function renderKunden(){
    const spendByEmail={}, countByEmail={};
    ST.bookings.filter(b=>['confirmed','active','returned'].includes(b.status)).forEach(b=>{const e=(b.customer_email||'').toLowerCase(); if(!e)return; spendByEmail[e]=(spendByEmail[e]||0)+(b.total_amount||0)+(b.late_fee_amount||0); countByEmail[e]=(countByEmail[e]||0)+1;});
    const lifeOf=u=>spendByEmail[(u.email||'').toLowerCase()]||0;
    const payingCust=Object.keys(countByEmail).length;
    const repeaters=Object.values(countByEmail).filter(c=>c>=2).length;
    const repeatRate=payingCust?Math.round(repeaters/payingCust*100):0;
    const avgLtv=payingCust?Object.values(spendByEmail).reduce((s,v)=>s+v,0)/payingCust:0;
    let list=ST.users.slice();
    if(custFilter==='leads')list=list.filter(u=>(u.bookings_count||0)===0);

  let _fmap=null, _fmapTries=0;
  function ago(iso){ if(!iso)return null; let s=(Date.now()-new Date(iso).getTime())/1000; if(s<0)return 'gerade eben'; if(s<90)return Math.round(s)+' Sek.'; if(s<5400)return Math.round(s/60)+' Min.'; if(s<172800)return Math.round(s/3600)+' Std.'; return Math.round(s/86400)+' Tg.'; }

  function renderGpsStatus(d){
    const el=document.getElementById('gpsStatus'); if(!el)return;
    const ss=d.sync_state||null, trs=d.trailers||[];
    const withImei=trs.filter(t=>t.tracker_imei);
    const syncAgeMin=ss&&ss.last_sync_at?(Date.now()-new Date(ss.last_sync_at).getTime())/60000:null;
    let ok=false,msg,detail;
    if(!withImei.length){ msg='Kein Tracker hinterlegt'; detail='Diebstahlschutz ist NICHT aktiv — keinem Anhänger ist eine Tracker-IMEI zugeordnet.'; }
    else if(!ss||!ss.last_sync_at){ msg='GPS-Abgleich lief noch nie'; detail='Der Standort-Abgleich hat sich nie gemeldet — Traccar-Zugang (Vercel-Umgebung) prüfen.'; }
    else if(ss.last_error){ msg='GPS-Abgleich meldet Fehler'; detail=ss.last_error; }
    else if(syncAgeMin>10){ msg='GPS-Abgleich steht'; detail='Letzter erfolgreicher Abgleich vor '+ago(ss.last_sync_at)+' — der Minuten-Job läuft nicht mehr.'; }
    else { ok=true; msg='Diebstahlschutz scharf'; detail='Standort-Abgleich läuft · letzter Sync vor '+ago(ss.last_sync_at)+' · '+withImei.length+'/'+trs.length+' Anhänger mit Tracker.'; }
    const rows=withImei.map(t=>{
      const seenMin=t.last_seen_at?((Date.now()-new Date(t.last_seen_at).getTime())/60000):null;
      const sig=seenMin==null?'<span class="pill grey">kein Signal</span>':seenMin>90?'<span class="pill yellow">ruht · '+ago(t.last_seen_at)+'</span>':'<span class="pill green">● live · '+ago(t.last_seen_at)+'</span>';
      return `<div class="drow"><span class="k">${esc(t.name||'Anhänger')}${t.is_moving?' 🚗':''}</span><span class="v">${sig}${t.last_battery_percent!=null?' · 🔋'+t.last_battery_percent+'%':''}</span></div>`;
    }).join('');
    el.innerHTML=`<div class="card" style="border-color:${ok?'rgba(52,199,89,.35)':'rgba(255,93,93,.45)'};margin-bottom:10px;padding:14px 16px">
      <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap"><span class="pill ${ok?'green':'red'}">${ok?'✓ AKTIV':'⚠ INAKTIV'}</span><strong style="font-size:.95rem">${esc(msg)}</strong></div>
      <div style="font-size:.8rem;color:var(--muted);margin:8px 0 2px;line-height:1.5">${esc(detail)}</div>
      ${rows?`<div class="dblock" style="margin:10px 0 0;background:var(--s1)">${rows}</div>`:''}
    </div>`;
  }
  function trailerIcon(t){
    const tr=(ST.trailers||[]).find(x=>String(x.id)===String(t.id)||x.name===t.name)||{};
    const img=safeUrl(tr.image_url)||safeUrl(t.image_url)||'/logo-icon.png?v=10';

  function initFmap(pos){
    const el=document.getElementById('flotteMap'); if(!el)return;
    if(typeof L==='undefined'){ if(_fmapTries++<20)setTimeout(()=>initFmap(pos),250); return; }
    if(_fmap){try{_fmap.remove();}catch(e){} _fmap=null;}
    const center=pos.length?[pos[0].last_lat,pos[0].last_lng]:[53.0793,8.8017];
    _fmap=L.map(el,{attributionControl:false}).setView(center,pos.length?12:11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_fmap);
    const markers=pos.map(t=>{const m=L.marker([t.last_lat,t.last_lng],{icon:trailerIcon(t)}).addTo(_fmap); m.bindPopup(`<b>${esc(t.name||'')}</b><br>${t.last_seen_at?'zuletzt '+fmtDate(t.last_seen_at):'—'}${t.last_battery_percent!=null?'<br>🔋 '+t.last_battery_percent+'%':''}${t.last_speed_kmh?'<br>'+t.last_speed_kmh+' km/h':''}`); return m;});
    if(markers.length>1){try{_fmap.fitBounds(L.featureGroup(markers).getBounds().pad(0.3));}catch(e){}}
    setTimeout(()=>{try{_fmap&&_fmap.invalidateSize();}catch(e){}},250);
  }

  /* ── KALENDER (Belegung) ── */
  function renderKalender(){
    const DAYS=21;
    const t0=new Date(); t0.setHours(0,0,0,0);
    const days=[]; for(let i=0;i<DAYS;i++){const d=new Date(t0);d.setDate(t0.getDate()+i);days.push(d);}
    const wd=['So','Mo','Di','Mi','Do','Fr','Sa'];
    const trailers=ST.trailers.length?ST.trailers:[{name:'—'}];
    const active=ST.bookings.filter(b=>['confirmed','active'].includes(b.status)&&b.start_time&&b.end_time);
    const stCol=s=>s==='active'?'var(--green)':'var(--blue)';
    const head=`<td class="cal-name"></td>`+days.map(d=>{const we=d.getDay()===0||d.getDay()===6;return `<td class="cal-h${we?' we':''}">${d.getDate()}<br><span>${wd[d.getDay()]}</span></td>`;}).join('');
    const rows=trailers.map(t=>{
      const cells=days.map(d=>{
        const ds=d.getTime(), de=ds+86400000, we=d.getDay()===0||d.getDay()===6;
        const b=active.find(x=>x.trailers&&x.trailers.name===t.name&&new Date(x.start_time).getTime()<de&&new Date(x.end_time).getTime()>=ds);
        if(b)return `<td class="cal-c busy" style="background:${stCol(b.status)}" title="${esc(b.customer_name||'')} · ${fmtDay(b.start_time)} → ${fmtDay(b.end_time)}" onclick="openBooking('${b.id}')"></td>`;
        return `<td class="cal-c${we?' we':''}"></td>`;
      }).join('');
      return `<tr><td class="cal-name">${esc(t.name||'—')}${t.id&&!t.is_available?' 🔒':''}</td>${cells}</tr>`;
    }).join('');
    // Freie-Tage-Zusammenfassung (nächste 7 Tage)
    let freeSoon=0;
    trailers.filter(t=>t.id).forEach(t=>{ for(let i=0;i<7;i++){const ds=t0.getTime()+i*86400000,de=ds+86400000; const busy=active.some(x=>x.trailers&&x.trailers.name===t.name&&new Date(x.start_time).getTime()<de&&new Date(x.end_time).getTime()>=ds); if(!busy)freeSoon++;} });
    const cap7=Math.max(1,trailers.filter(t=>t.id).length*7);
    const h=`<div class="grid kpis">
        <div class="kpi"><div class="label">Freie Anhänger-Tage · nächste 7 T.</div><div class="val sm">${freeSoon}</div><div class="sub">von ${cap7} möglich</div></div>
        <div class="kpi"><div class="label">Vorgebucht · nächste 7 T.</div><div class="val sm">${Math.round((1-freeSoon/cap7)*100)}%</div></div>
      </div>
      <div class="sect-title">📅 Belegung · nächste ${DAYS} Tage</div>
      <div class="card" style="padding:12px;overflow-x:auto"><table class="cal"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>
      <div style="display:flex;gap:14px;margin-top:12px;font-size:.74rem;flex-wrap:wrap;align-items:center"><span class="lg-item" style="padding:0"><span class="lg-dot" style="background:var(--green)"></span>aktiv (läuft)</span><span class="lg-item" style="padding:0"><span class="lg-dot" style="background:var(--blue)"></span>bestätigt (kommt)</span><span style="color:var(--dim)">Klick auf belegten Tag → Buchung öffnen</span></div></div>`;
    document.getElementById('pane-kalender').innerHTML=h;
  }

  /* ── FINANZEN ── */
  let finPeriod='monat';
  let statPeriod='monat';
  function renderFinanzen(){
    const periods=[['heute','Heute'],['woche','7 Tage'],['monat','Monat'],['quartal','Quartal'],['jahr','Jahr'],['gesamt','Gesamt']];
    const {from,prevFrom,prevTo}=periodRange(finPeriod);
    const paidAll=ST.bookings.filter(b=>['confirmed','active','returned'].includes(b.status));
    const paid=paidAll.filter(b=>new Date(b.created_at)>=from);
    const prev=prevFrom?paidAll.filter(b=>{const d=new Date(b.created_at);return d>=prevFrom&&d<prevTo;}):null;
    const sum=(arr,f)=>arr.reduce((s,b)=>s+f(b),0);
    const bruttoOf=b=>(b.total_amount||0)+(b.late_fee_amount||0);
    const rev=sum(paid,bruttoOf), insRev=sum(paid,b=>b.insurance_amount||0);
    const txns=paid.length, net=rev/1.19, vat=rev-net, fee=rev*0.015+txns*0.25, avg=txns?rev/txns:0;
    const keep=net-fee; // was nach MwSt & Stripe übrig bleibt
    const pRev=prev?sum(prev,bruttoOf):null, pTxns=prev?prev.length:null, pAvg=prev&&prev.length?pRev/prev.length:null, pInsRev=prev?sum(prev,b=>b.insurance_amount||0):null;
    let h=`<div class="toolbar">`+periods.map(([k,l])=>`<button class="chip ${finPeriod===k?'active':''}" onclick="finPeriod='${k}';renderFinanzen()">${l}</button>`).join('')+`</div>`;
    if(prevFrom)h+=`<div style="font-size:.72rem;color:var(--dim);margin:-4px 2px 10px">▲▼ = Vergleich zur Vorperiode${['heute','woche'].includes(finPeriod)?' · laufende Periode noch nicht abgeschlossen (anteilig)':''}</div>`;
    const fleetN=Math.max(1,ST.trailers.length);
    const daysIn=Math.max(1,Math.min((Date.now()-from.getTime())/86400000,366));
    const revPad=rev/(fleetN*daysIn);
    const mNow=new Date(), mStart=new Date(mNow.getFullYear(),mNow.getMonth(),1);
    const mRev=paidAll.filter(b=>new Date(b.created_at)>=mStart).reduce((s,b)=>s+bruttoOf(b),0);
    const dayOfM=Math.max(1,mNow.getDate()), daysInM=new Date(mNow.getFullYear(),mNow.getMonth()+1,0).getDate();
    const mProj=mRev/dayOfM*daysInM;
    h+=`<div class="grid kpis">
      <div class="kpi"><div class="label">Umsatz (brutto) ${trendBadge(rev,pRev)}</div><div class="val">${eur(rev)}</div><div class="sub">${txns} bezahlte Buchungen ${pTxns!=null?trendBadge(txns,pTxns):''}</div></div>
      <div class="kpi"><div class="label">Ø Buchungswert ${pAvg!=null?trendBadge(avg,pAvg):''}</div><div class="val sm">${eur(avg)}</div></div>
      <div class="kpi"><div class="label">Umsatz / Anhänger-Tag</div><div class="val sm">${eur(revPad)}</div><div class="sub">${fleetN} Anhänger · ${Math.round(daysIn)} Tage</div></div>
      <div class="kpi"><div class="label">Schutzpaket-Umsatz ${pInsRev!=null?trendBadge(insRev,pInsRev):''}</div><div class="val sm">${eur(insRev)}</div></div>
    </div>`;
    h+=`<div class="card" style="padding:14px 16px;margin-top:2px"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap"><div><div style="font-size:.78rem;color:var(--muted)">📈 Hochrechnung ${esc(mNow.toLocaleDateString('de-DE',{month:'long'}))}</div><div style="font-size:1.15rem;font-weight:800;margin-top:2px">${eur(mProj)}</div></div><div style="text-align:right;font-size:.78rem;color:var(--dim)">aktuell ${eur(mRev)}<br>Tag ${dayOfM} / ${daysInM}</div></div></div>`;
    // Wohin geht der Brutto-Umsatz? — gestapelte Aufteilung (behalten / Stripe / MwSt)
    const segW=v=>rev?Math.max(0,v/rev*100):0;
    h+=`<div class="sect-title">Wohin geht der Brutto-Umsatz?</div><div class="card" style="padding:15px 16px">
      <div style="display:flex;height:20px;border-radius:6px;overflow:hidden;gap:2px;background:var(--s3)">
        <div title="Behalten (nach Stripe & MwSt)" style="width:${segW(keep)}%;background:var(--green)"></div>
        <div title="Stripe-Gebühren" style="width:${segW(fee)}%;background:var(--red)"></div>
        <div title="MwSt ans Finanzamt" style="width:${segW(vat)}%;background:var(--yellow)"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:.8rem">
        <span class="lg-item" style="padding:0"><span class="lg-dot" style="background:var(--green)"></span>Behalten <b style="margin-left:4px">${eur(keep)}</b></span>
        <span class="lg-item" style="padding:0"><span class="lg-dot" style="background:var(--red)"></span>Stripe <b style="margin-left:4px">−${eur(fee)}</b></span>
        <span class="lg-item" style="padding:0"><span class="lg-dot" style="background:var(--yellow)"></span>MwSt <b style="margin-left:4px">${eur(vat)}</b></span>
      </div>
      <div style="color:var(--dim);font-size:.72rem;margin-top:9px">Netto-Umsatz ${eur(net)} · MwSt/Gebühr sind Schätzwerte.</div>
    </div>`;
    const ib=paid.filter(b=>b.insurance_type==='basis').length, ip=paid.filter(b=>b.insurance_type==='premium').length, inone=paid.filter(b=>!b.insurance_type||b.insurance_type==='none').length;
    const cpCount=paid.filter(b=>b.cancellation_protection).length, cpRev=sum(paid,b=>b.cancellation_protection_fee||0);
    const ffCount=paid.filter(b=>b.free_floating).length, ffRev=ffCount*15;
    const pct=n=>txns?Math.round(n/txns*100):0;
    h+=`<div class="sect-title">Zusatz-Umsätze</div><div class="card">
      <div class="row"><div class="main"><div class="t1">Schutzpaket (Versicherung)</div><div class="t2">${ib+ip} von ${txns} · ${pct(ib+ip)}% mit Paket</div></div><div class="right amt" style="color:var(--green)">${eur(insRev)}</div></div>
      <div class="row"><div class="main"><div class="t1">Storno-Schutz</div><div class="t2">${cpCount} von ${txns} · ${pct(cpCount)}% mit Schutz</div></div><div class="right amt" style="color:var(--green)">${eur(cpRev)}</div></div>
      <div class="row"><div class="main"><div class="t1">Free-Floating</div><div class="t2">${ffCount} von ${txns} · ${pct(ffCount)}%</div></div><div class="right amt" style="color:var(--green)">${eur(ffRev)}</div></div>
    </div>`;
    h+=`<div class="sect-title">Schutzpaket-Wahl</div><div class="card" style="padding:14px 16px">${barChart([['Basis',ib],['Premium',ip],['Keins',inone]])}</div>`;
    h+=`<div style="color:var(--dim);font-size:.78rem;margin-top:12px;padding:0 4px">💡 Zeitraum: ${periods.find(p=>p[0]===finPeriod)[1]} · Zahlart pro Buchung im Detail (live aus Stripe). MwSt/Gebühr = Schätzwerte.</div>`;
    document.getElementById('pane-finanzen').innerHTML=h;
  }

  /* ── STATISTIK (Umsatz & Buchungs-Analyse) ── */
  const TARIFF_LBL={'3h':'Kurztrip','6h':'Halber Tag',day:'Ganzer Tag',weekend:'Wochenende',week:'1 Woche',flexible:'Individuell'};
  // Reine Miete = bezahlter Betrag ohne Schutzpaket/Storno/Free-Floating (Free-Float pauschal 15 €)
  function rentOf(b){ return Math.max(0,(b.total_amount||0)-(b.insurance_amount||0)-(b.cancellation_protection_fee||0)-(b.free_floating?15:0)); }
  function renderStatistik(){
    const periods=[['woche','7 Tage'],['monat','Monat'],['quartal','Quartal'],['jahr','Jahr'],['gesamt','Gesamt']];
    const {from,prevFrom,prevTo}=periodRange(statPeriod);
    const rangeAll=ST.bookings.filter(b=>new Date(b.created_at)>=from);
    const paid=rangeAll.filter(b=>['confirmed','active','returned'].includes(b.status));
    const cancelled=rangeAll.filter(b=>b.status==='cancelled');
    const prevPaid=prevFrom?ST.bookings.filter(b=>{const d=new Date(b.created_at);return d>=prevFrom&&d<prevTo&&['confirmed','active','returned'].includes(b.status);}):null;
    const txns=paid.length;
    const rev=paid.reduce((s,b)=>s+(b.total_amount||0)+(b.late_fee_amount||0),0);
    const pRev=prevPaid?prevPaid.reduce((s,b)=>s+(b.total_amount||0)+(b.late_fee_amount||0),0):null;
    const pTxns=prevPaid?prevPaid.length:null;
    const avg=txns?rev/txns:0;
    // Zusatz-Optionen & Quoten
    const cpCount=paid.filter(b=>b.cancellation_protection).length;
    const cpRate=txns?Math.round(cpCount/txns*100):0;
    const cpRev=paid.reduce((s,b)=>s+(b.cancellation_protection_fee||0),0);
    const insBasis=paid.filter(b=>b.insurance_type==='basis').length;
    const insPrem=paid.filter(b=>b.insurance_type==='premium').length;
    const insNone=txns-insBasis-insPrem;
    const insRev=paid.reduce((s,b)=>s+(b.insurance_amount||0),0);
    const ffCount=paid.filter(b=>b.free_floating).length;
    const ffRev=ffCount*15;
    const addonRev=cpRev+insRev+ffRev;
    const cancelRate=(txns+cancelled.length)?Math.round(cancelled.length/(txns+cancelled.length)*100):0;

    let h=`<div class="toolbar">`+periods.map(([k,l])=>`<button class="chip ${statPeriod===k?'active':''}" onclick="statPeriod='${k}';renderStatistik()">${l}</button>`).join('')+`</div>`;
    h+=`<div class="grid kpis">
      <div class="kpi"><div class="label">💶 Umsatz (brutto) ${pRev!=null?trendBadge(rev,pRev):''}</div><div class="val">${eur(rev)}</div><div class="sub">${txns} bezahlte Buchungen ${pTxns!=null?trendBadge(txns,pTxns):''}</div></div>
      <div class="kpi"><div class="label">Ø Buchungswert</div><div class="val sm">${eur(avg)}</div></div>
      <div class="kpi"><div class="label">🛡️ Storno-Schutz-Quote</div><div class="val sm">${cpRate}%</div><div class="sub">${cpCount} mit Schutz · ${eur(cpRev)}</div></div>
      <div class="kpi"><div class="label">➕ Zusatz-Umsatz</div><div class="val sm">${eur(addonRev)}</div><div class="sub">Schutzpaket + Storno + Free-Float</div></div>
      <div class="kpi"><div class="label">↩︎ Storno-Quote</div><div class="val sm">${cancelRate}%</div><div class="sub">${cancelled.length} storniert im Zeitraum</div></div>
    </div>`;

    // Umsatz-Verlauf (adaptiv: 14 Tage bei „7 Tage", sonst 6 Monate) — Trend über die Zeit, unabhängig vom Filter
    const trendDaily=(statPeriod==='woche');
    const paidAll=ST.bookings.filter(b=>['confirmed','active','returned'].includes(b.status));
    const buckets=[]; const nowM=new Date();
    if(trendDaily){
      for(let i=13;i>=0;i--){const d=new Date(nowM.getFullYear(),nowM.getMonth(),nowM.getDate()-i);buckets.push({key:d.toDateString(),label:d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}),value:0});}
      paidAll.forEach(b=>{const bk=buckets.find(x=>x.key===new Date(b.created_at).toDateString());if(bk)bk.value+=(b.total_amount||0)+(b.late_fee_amount||0);});
    } else {
      for(let i=5;i>=0;i--){const d=new Date(nowM.getFullYear(),nowM.getMonth()-i,1);buckets.push({key:d.getFullYear()+'-'+d.getMonth(),label:d.toLocaleDateString('de-DE',{month:'short'}),value:0});}
      paidAll.forEach(b=>{const c=new Date(b.created_at);const bk=buckets.find(x=>x.key===c.getFullYear()+'-'+c.getMonth());if(bk)bk.value+=(b.total_amount||0)+(b.late_fee_amount||0);});
    }
    h+=`<div class="sect-title">Umsatz-Verlauf ${trendDaily?'· 14 Tage':'· 6 Monate'}</div><div class="card" style="padding:16px 16px 10px">${areaChart(buckets.map(b=>({label:b.label,value:Math.round(b.value)})),v=>eur(v))}</div>`;

    // Was buchen die Kunden? (Tarif-Verteilung: Anzahl + reine Miete)
    const byTariff={}; paid.forEach(b=>{const k=b.pricing_type||'?';(byTariff[k]=byTariff[k]||{c:0,r:0}).c++;byTariff[k].r+=rentOf(b);});
    const tariffRows=Object.entries(byTariff).sort((a,b)=>b[1].c-a[1].c).map(([k,v])=>[TARIFF_LBL[k]||k,v.c,eur(v.r)]);
    h+=`<div class="sect-title">Was buchen die Kunden? · Tarif</div><div class="card" style="padding:14px 16px">${barChart(tariffRows,v=>v+'×',{wide:true,labelWide:true,color:'var(--blue)'})}</div>`;

    // Zusatz-Optionen — Quoten als Donuts
    h+=`<div class="sect-title">Zusatz-Optionen — Quoten</div>
      <div class="viz-grid">
        <div class="card" style="padding:15px 16px"><div style="font-size:.82rem;color:var(--muted);margin-bottom:12px;font-weight:600">🛡️ Storno-Schutz</div>${donut([{name:'Mit Schutz',value:cpCount,color:'var(--green)'},{name:'Ohne',value:Math.max(0,txns-cpCount),color:'var(--border2)'}],cpRate+'%','mit Schutz')}</div>
        <div class="card" style="padding:15px 16px"><div style="font-size:.82rem;color:var(--muted);margin-bottom:12px;font-weight:600">🧾 Schutzpaket</div>${donut([{name:'Basis',value:insBasis,color:'var(--blue)'},{name:'Premium',value:insPrem,color:'var(--orange)'},{name:'Keins',value:Math.max(0,insNone),color:'var(--border2)'}],(txns?Math.round((insBasis+insPrem)/txns*100):0)+'%','mit Paket')}</div>
        <div class="card" style="padding:15px 16px"><div style="font-size:.82rem;color:var(--muted);margin-bottom:12px;font-weight:600">📍 Free-Floating</div>${donut([{name:'Ja',value:ffCount,color:'var(--yellow)'},{name:'Nein',value:Math.max(0,txns-ffCount),color:'var(--border2)'}],(txns?Math.round(ffCount/txns*100):0)+'%','Free-Float')}</div>
      </div>`;

    // Echte Auslastung je Anhänger: belegte Stunden / verfügbare Stunden im Zeitraum
    const winFrom=Math.max(from.getTime(), Date.now()-366*86400000);
    const winHours=Math.max(1,(Date.now()-winFrom)/3600000);
    const util={}; ST.trailers.forEach(t=>{if(t.name)util[t.name]=0;});
    paidAll.forEach(b=>{ const n=b.trailers?.name; if(!n||util[n]===undefined||!b.start_time||!b.end_time)return; const s=Math.max(new Date(b.start_time).getTime(),winFrom), e=Math.min(new Date(b.end_time).getTime(),Date.now()); if(e>s)util[n]+=(e-s)/3600000; });
    const utilRows=Object.entries(util).map(([n,hrs])=>[n,Math.min(100,Math.round(hrs/winHours*100))]).sort((a,b)=>b[1]-a[1]);
    const fleetUtil=utilRows.length?Math.round(utilRows.reduce((s,r)=>s+r[1],0)/utilRows.length):0;
    h+=`<div class="sect-title">Auslastung je Anhänger · Flotte Ø ${fleetUtil}%</div><div class="card" style="padding:14px 16px">${barChart(utilRows,v=>v+'%',{wide:true,labelWide:true,color:'var(--orange)'})}<div style="color:var(--dim);font-size:.72rem;margin-top:10px">% der Zeit vermietet im gewählten Fenster (bezahlte Buchungen). Niedrig = Leerstand · dauerhaft &gt;75 % = Zeit für einen weiteren Anhänger.</div></div>`;
    // Umsatz + Anzahl je Anhänger (Ertrag)
    const byTrailer={}; paid.forEach(b=>{const n=b.trailers?.name||'?';(byTrailer[n]=byTrailer[n]||{c:0,r:0}).c++;byTrailer[n].r+=(b.total_amount||0);});
    const trailerRows=Object.entries(byTrailer).sort((a,b)=>b[1].r-a[1].r).map(([n,v])=>[n,v.r,`${v.c}×`]);
    h+=`<div class="sect-title">Ertrag je Anhänger</div><div class="card" style="padding:14px 16px">${barChart(trailerRows,v=>eur(v),{wide:true,labelWide:true,color:'var(--green)'})}</div>`;

    // Wann wird gebucht? — Heatmap Wochentag × Tageszeit (nach Buchungs-Start)
    const wdLbl=['Mo','Di','Mi','Do','Fr','Sa','So'], wdMap=[1,2,3,4,5,6,0];
    const slotLbl=['Nacht','Morgen','Mittag','Nachm.','Abend']; // 0–6 · 6–10 · 10–14 · 14–18 · 18–24
    const slotOf=hr=>hr<6?0:hr<10?1:hr<14?2:hr<18?3:4;
    const hm=wdMap.map(()=>[0,0,0,0,0]);
    paid.forEach(b=>{if(!b.start_time)return;const d=new Date(b.start_time);const ri=wdMap.indexOf(d.getDay());if(ri<0)return;hm[ri][slotOf(d.getHours())]++;});
    h+=`<div class="sect-title">Wann wird gebucht? · Wochentag × Tageszeit</div><div class="card" style="padding:16px">${heatmap(hm,wdLbl,slotLbl)}</div>`;

    h+=`<div style="color:var(--dim);font-size:.78rem;margin-top:16px;padding:0 4px;line-height:1.5">💡 Der Zeitraum-Filter wirkt auf KPIs, Tarife & Quoten. Der Umsatz-Verlauf zeigt immer den Trend (14 Tage bzw. 6 Monate). „Miete" = Betrag ohne Schutzpaket/Storno/Free-Float. Balken/Segmente zeigen Details beim Drüberfahren.</div>`;
    document.getElementById('pane-statistik').innerHTML=h;
  }

  /* ── COCKPIT (Besucher-Trichter + Herkunft) ── */
  let cockpitPeriod='d30';
  const SRCLBL={google_ads:'Google Ads',kleinanzeigen:'Kleinanzeigen',google_organic:'Google (organisch)',suche:'Andere Suche',social:'Social Media',ratgeber:'Ratgeber',direkt:'Direkt',unbekannt:'Unbekannt'};
  async function renderCockpit(){
    const pane=document.getElementById('pane-cockpit');
    if(!ST.analytics){
      pane.innerHTML='<div class="empty">Lädt…</div>';
      try{ ST.analytics=await api('analytics'); }
      catch(e){ pane.innerHTML='<div class="empty">Konnte Cockpit-Daten nicht laden.</div>'; return; }
    }
    if(ST.analytics.missing){
      pane.innerHTML=`<div class="card" style="padding:16px 18px;line-height:1.6"><strong>⚙️ Cockpit fast fertig — ein Schritt fehlt.</strong><br><span style="color:var(--dim);font-size:.86rem">Führe einmalig die SQL-Migration <code>supabase-migration-analytics-events.sql</code> im Supabase-SQL-Editor aus (wie bei der Notify-Liste). Danach füllt sich das Cockpit automatisch mit jedem Besuch.</span></div>`;
      return;
    }
    const d=ST.analytics[cockpitPeriod]||{}; const f=d.funnel||{}; const vis=d.visitors||0;
    const pc=n=>vis?Math.min(100,Math.round(n/vis*100)):0;
    const steps=[['Besucher',vis],['Buchung gestartet',f.start||0],['Schritt 3 erreicht',f.step3||0],['Führerschein-Check',f.dl||0],['Bezahlen geklickt',f.pay||0],['Buchung abgeschlossen',f.done||0]];
    let worst=-1,wd=0; for(let i=1;i<steps.length;i++){const drop=steps[i-1][1]-steps[i][1]; if(drop>wd){wd=drop;worst=i;}}
    const mx=Math.max(1,vis);
    const funnel=steps.map((s,i)=>`<div class="bar-row"><div class="bl">${esc(s[0])}${i===worst&&wd>0?' <span style="color:var(--yellow);font-size:.74rem">← größter Absprung</span>':''}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.round(s[1]/mx*100))}%"></div></div><div class="bv">${s[1]} · ${pc(s[1])}%</div></div>`).join('');
    // ── Auto-Analyse: wo verlierst du die Leute, DIE buchen wollen? ──
    // Größter PROZENTUALER Absprung ab "Buchung gestartet" — aber nur Schritte mit
    // genug Stichprobe (Vorgänger ≥5), sonst ist die %-Zahl Rauschen. Der absolute
    // Besucher→Start-Absprung ist immer am größten (nie buchen alle) → wäre irreführend.
    const _done=steps[5][1], _started=steps[1][1];
    const _conv=vis?Math.round(_done/vis*1000)/10:0;
    const _sconv=vis?Math.round(_started/vis*1000)/10:0;
    let _wi=-1,_wp=0,_wlost=0;
    for(let i=2;i<steps.length;i++){
      const prev=steps[i-1][1]; if(prev<5) continue;
      const lost=prev-steps[i][1]; if(lost<=0) continue;
      const p=lost/prev; if(p>_wp){_wp=p;_wi=i;_wlost=lost;}
    }
    const COCKPIT_TIPS={
      1:'Die meisten Besucher starten gar keine Buchung. → Ist der „Buchen"-Button sofort sichtbar (Hero + Nav)? Schafft die Startseite genug Vertrauen (Preise, Bewertungen, „so funktioniert\'s")? Teste einen klareren Haupt-CTA.',
      2:'Leute starten, springen aber vor dem Konto ab (Datum/Optionen/Preis). → Preis-Schock? Schutzpakete zu kompliziert? Schritt zu lang — vor allem mobil? Sieh dir Recordings genau dieses Schritts an und kürze, wo es geht.',
      3:'Der Konto-Schritt ist die größte Hürde. → Registrierung muss in einem Rutsch gehen (E-Mail-Bestätigung ist jetzt aus ✓). Bleibt der Absprung hoch → „als Gast buchen" (Konto optional) erwägen.',

  function barChart(rows,fmt,opts){
    opts=opts||{};
    const max=Math.max(1,...rows.map(r=>r[1]));
    const wide=opts.wide?' wide':'';
    const lw=opts.labelWide?' wideL':'';
    return rows.map(([l,v,sub])=>`<div class="bar-row" title="${esc(l)}: ${fmt?fmt(v):v}${sub?' · '+esc(sub):''}"><div class="bl${lw}">${esc(l)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%${opts.color?';background:'+opts.color:''}"></div></div><div class="bv${wide}">${fmt?fmt(v):v}${sub?`<span style="color:var(--dim);font-weight:600"> · ${esc(sub)}</span>`:''}</div></div>`).join('')||'<div class="empty">Keine Daten.</div>';
  }
  // ── Donut (Anteile) ── segs:[{name,value,color}]
  function donut(segs,centerVal,centerSub){
    const total=segs.reduce((s,x)=>s+x.value,0);
    const r=52,cx=64,cy=64,C=2*Math.PI*r,sw=17; let off=0;
    const arcs = total ? segs.filter(s=>s.value>0).map(s=>{
      const frac=s.value/total, len=Math.max(0,frac*C-3);
      const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="butt" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"><title>${esc(s.name)}: ${s.value} (${Math.round(frac*100)}%)</title></circle>`;
      off+=frac*C; return el;
    }).join('') : `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="${sw}"/>`;
    return `<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <svg width="128" height="128" viewBox="0 0 128 128" style="flex-shrink:0">${arcs}
        <text x="64" y="61" text-anchor="middle" fill="var(--text)" font-size="23" font-weight="800">${esc(String(centerVal))}</text>
        <text x="64" y="80" text-anchor="middle" fill="var(--muted)" font-size="10" style="text-transform:uppercase;letter-spacing:.06em">${esc(centerSub||'')}</text>
      </svg>
      <div class="donut-legend" style="flex:1;min-width:130px">${segs.map(s=>`<div class="lg-item"><span class="lg-dot" style="background:${s.color}"></span><span class="lg-name">${esc(s.name)}</span><span class="lg-val">${s.value}${total?` · ${Math.round(s.value/total*100)}%`:''}</span></div>`).join('')}</div>
    </div>`;
  }
  // ── Fläche/Linie mit Crosshair-Hover ── pts:[{label,value}]
  let _chartSeq=0;
  function areaChart(pts,fmt){
    const n=pts.length; if(!n) return '<div class="empty">Keine Daten.</div>';
    const W=680,H=190,padL=6,padR=6,padT=16,padB=30, plotW=W-padL-padR, plotH=H-padT-padB;
    const max=Math.max(1,...pts.map(p=>p.value));
    const X=i=>padL+(n===1?plotW/2:(i/(n-1))*plotW);
    const Y=v=>padT+plotH-(v/max)*plotH;
    const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
    const area=`${X(0).toFixed(1)},${(padT+plotH).toFixed(1)} ${line} ${X(n-1).toFixed(1)},${(padT+plotH).toFixed(1)}`;
    let grid=''; for(let g=0;g<=2;g++){const gv=max*g/2, gy=Y(gv);grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="var(--border)" stroke-width="1"/><text x="${padL}" y="${(gy-4).toFixed(1)}" fill="var(--dim)" font-size="10">${fmt?fmt(gv):Math.round(gv)}</text>`;}
    const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.value).toFixed(1)}" r="3.5" fill="var(--orange)" stroke="var(--s1)" stroke-width="2"/>`).join('');
    const step=Math.ceil(n/7);
    const xlabels=pts.map((p,i)=>(i%step===0||i===n-1)?`<text x="${X(i).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="10" text-anchor="middle">${esc(p.label)}</text>`:'').join('');
    const id='ac'+(++_chartSeq);
    const meta=pts.map((p,i)=>({x:+(X(i)/W*100).toFixed(2), y:+(Y(p.value)/H*100).toFixed(2), sx:+X(i).toFixed(1), l:p.label, v:fmt?fmt(p.value):String(p.value)}));
    return `<div class="chart-wrap" id="${id}" data-pts='${esc(JSON.stringify(meta))}' onmousemove="chartHover(event,'${id}')" onmouseleave="chartOut('${id}')">
      <div class="chart-tip" id="${id}_t"></div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img">
        <defs><linearGradient id="stRevGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--orange)" stop-opacity="0.28"/><stop offset="100%" stop-color="var(--orange)" stop-opacity="0.02"/></linearGradient></defs>
        ${grid}<polygon points="${area}" fill="url(#stRevGrad)"/><polyline points="${line}" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <line id="${id}_x" x1="0" y1="${padT}" x2="0" y2="${(padT+plotH).toFixed(1)}" stroke="var(--orange)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
        ${dots}<circle id="${id}_d" r="5" fill="var(--orange)" stroke="var(--s1)" stroke-width="2" opacity="0"/>${xlabels}
      </svg>
    </div>`;
  }
  function chartHover(e,id){
    const w=document.getElementById(id); if(!w)return;
    let meta; try{meta=JSON.parse(w.getAttribute('data-pts'));}catch(_){return;}
    if(!meta||!meta.length)return;
    const r=w.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width*100;
    let bi=0,bd=1e9; meta.forEach((m,i)=>{const d=Math.abs(m.x-px);if(d<bd){bd=d;bi=i;}});
    const m=meta[bi], tip=document.getElementById(id+'_t');
    if(tip){ tip.innerHTML=`${esc(m.l)} · <span class="tv">${esc(m.v)}</span>`; tip.style.left=m.x+'%'; tip.style.top=m.y+'%'; tip.style.opacity='1'; }
    const xl=document.getElementById(id+'_x'); if(xl){ xl.setAttribute('x1',m.sx); xl.setAttribute('x2',m.sx); xl.setAttribute('opacity','1'); }
    const dt=document.getElementById(id+'_d'); if(dt){ dt.setAttribute('cx',m.sx); dt.setAttribute('cy',(m.y/100*190).toFixed(1)); dt.setAttribute('opacity','1'); }
  }
  function chartOut(id){ ['_t','_x','_d'].forEach(s=>{const el=document.getElementById(id+s); if(el){ if(s==='_t')el.style.opacity='0'; else el.setAttribute('opacity','0'); }}); }

  // ── Zeitraum mit Vorperiode (für Trend-Vergleich) ──
  function periodRange(p){
    const n=new Date(), y=n.getFullYear(), m=n.getMonth(), day=n.getDate();
    let from, prevFrom=null, prevTo=null, to=new Date();
    if(p==='heute'){ from=new Date(y,m,day); prevFrom=new Date(y,m,day-1); prevTo=from; }
    else if(p==='woche'){ from=new Date(y,m,day-6); from.setHours(0,0,0,0); prevFrom=new Date(y,m,day-13); prevFrom.setHours(0,0,0,0); prevTo=from; }
    else if(p==='monat'){ from=new Date(y,m,1); prevFrom=new Date(y,m-1,1); prevTo=from; }
    else if(p==='quartal'){ const q=Math.floor(m/3); from=new Date(y,q*3,1); prevFrom=new Date(y,q*3-3,1); prevTo=from; }
    else if(p==='jahr'){ from=new Date(y,0,1); prevFrom=new Date(y-1,0,1); prevTo=new Date(y,0,1); }
    else { from=new Date(0); }
    return {from,to,prevFrom,prevTo};
  }
  // Trend-Badge vs. Vorperiode. invert=true → weniger ist besser (z.B. Storno-Quote).
  function trendBadge(cur,prev,invert){
    if(prev==null)return '';
    if(prev===0)return cur>0?'<span class="trend up">▲ neu</span>':'';
    const d=Math.round((cur-prev)/Math.abs(prev)*100);
    if(d===0)return '<span class="trend flat">±0 %</span>';
    const good=invert?d<0:d>0;
    return `<span class="trend ${good?'up':'down'}">${d>0?'▲':'▼'} ${Math.abs(d)} %</span>`;
  }
  // ── Heatmap (sequentiell, 1 Hue) ── matrix[row][col]=zahl
  function heatmap(matrix,rowLabels,colLabels){
    const flat=matrix.flat(), max=Math.max(1,...flat), tot=flat.reduce((a,b)=>a+b,0);
    if(!tot)return '<div class="empty">Noch keine Buchungen im Zeitraum.</div>';
    const cell=v=>{const o=v?(0.14+0.82*(v/max)):0;return `<td class="hm-cell" style="background:${v?`rgba(232,93,0,${o.toFixed(3)})`:'var(--s3)'}" title="${v} Buchung(en)">${v||''}</td>`;};
    let h='<div style="overflow-x:auto"><table class="hm"><thead><tr><th></th>'+colLabels.map(c=>`<th>${esc(c)}</th>`).join('')+'</tr></thead><tbody>';
    matrix.forEach((row,i)=>{ h+=`<tr><td class="hm-row">${esc(rowLabels[i])}</td>`+row.map(cell).join('')+'</tr>'; });
    return h+'</tbody></table></div><div class="hm-legend">weniger <i style="background:rgba(232,93,0,.14)"></i><i style="background:rgba(232,93,0,.44)"></i><i style="background:rgba(232,93,0,.72)"></i><i style="background:rgba(232,93,0,.96)"></i> mehr</div>';
  }

      ${b.status!=='cancelled'?`<button class="linkbtn" style="border-color:#7f1d1d;color:#fca5a5" onclick="cancelBooking('${b.id}')">⊘ Stornieren & erstatten</button>`:''}
    </div>`;
    openPanel('Buchung',h);
    loadPayment(b);
  }
  async function loadPayment(b){
    const mEl=document.getElementById('payMethod'), sEl=document.getElementById('payStatus');
    if(!b.stripe_payment_intent_id){ if(mEl)mEl.textContent='—'; if(sEl)sEl.innerHTML=statusPill(b.status); return; }
    try{
      const pi=ST.payCache[b.stripe_payment_intent_id] || await api('payment-info&pi='+encodeURIComponent(b.stripe_payment_intent_id));
      ST.payCache[b.stripe_payment_intent_id]=pi;
      if(!document.getElementById('payMethod'))return;
      if(pi.error){ document.getElementById('payMethod').textContent='Stripe n/a'; document.getElementById('payStatus').innerHTML=statusPill(b.status); return; }
      document.getElementById('payMethod').textContent=pi.method_label||pi.method_type||'–';
      const ok = pi.status==='succeeded' && !pi.refunded;
      let badge = pi.refunded ? `<span class="pill red">Erstattet (${eur(pi.amount_refunded)})</span>`
        : ok ? `<span class="pill green">✓ Bezahlt</span>`
        : `<span class="pill yellow">${esc(pi.status)}</span>`;
      document.getElementById('payStatus').innerHTML=badge;
    }catch(e){ if(document.getElementById('payMethod'))document.getElementById('payMethod').textContent='Fehler'; }
  }

  function openCustomer(email){

    h+=`<div class="dlabel">Stammdaten (Registrierung)</div><div class="dblock">

    h+=`<div class="dlabel">Führerschein</div><div class="dblock">
