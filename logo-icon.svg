<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Voll schwarzes Quadrat, KEINE abgerundeten Ecken
       (Google/Bing croppen sowieso zu Kreis — Hauptsache kein weisser Rand) -->
  <rect width="1024" height="1024" fill="#0D0D0D"/>

  <!-- Anhaenger-Korpus: weisses Rechteck mit Outline, fast formatfuellend -->
  <rect x="60" y="220" width="800" height="500" rx="40"
        fill="none" stroke="#FFFFFF" stroke-width="56" stroke-linejoin="round"/>

  <!-- Deichsel rechts -->
  <path d="M 860 720 L 970 800" stroke="#FFFFFF" stroke-width="56" stroke-linecap="round"/>

  <!-- Stuetzrad-Knubbel am Deichsel-Ende -->
  <circle cx="970" cy="810" r="34" fill="#FFFFFF"/>

  <!-- Grosses oranges Rad (unten links der Mitte, wie im Logo) -->
  <circle cx="360" cy="760" r="180" fill="#E85D00"/>

  <!-- Schwarzes Loch in der Mitte vom Rad -->
  <circle cx="360" cy="760" r="68" fill="#0D0D0D"/>
</svg>
