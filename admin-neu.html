<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="192x192" href="/logo-icon.png?v=10" />
  <link rel="apple-touch-icon" href="/logo-icon.png?v=10" />
  <title>CRM – SimpleTrailer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0E1117; --s1:#161B22; --s2:#1C232E; --s3:#222B38;
      --border:#2A323E; --border2:#36404E;
      --text:#E8EEF5; --muted:#8C99AB; --dim:#5E6B7D;
      --orange:#E85D00; --orange-soft:rgba(232,93,0,.14);
      --green:#2ECC71; --green-soft:rgba(46,204,113,.14);
      --red:#FF5D5D; --red-soft:rgba(255,93,93,.13);
      --yellow:#F5A623; --yellow-soft:rgba(245,166,35,.14);
      --blue:#4DA3FF; --blue-soft:rgba(77,163,255,.14);
      --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
      --radius:14px; --shadow:0 6px 24px rgba(0,0,0,.35);
    }
    html,body{overflow-x:clip;max-width:100%;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100dvh;font-size:15px;line-height:1.5;}
    .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
    .num{font-variant-numeric:tabular-nums;}
    a{color:inherit;}
    button{font-family:inherit;cursor:pointer;}
    ::-webkit-scrollbar{height:6px;width:6px;}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;}

    /* ── LOGIN ── */
    #loginView{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:34px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);}
    .login-card h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
    .login-card .sub{color:var(--muted);font-size:.86rem;margin-bottom:22px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:.74rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .field input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s;}
    .field input:focus{border-color:var(--orange);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;font-weight:700;font-size:.92rem;padding:12px 18px;transition:transform .08s,opacity .15s,background .15s;}
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--orange);color:#fff;width:100%;}
    .btn-ghost{background:var(--s2);border:1px solid var(--border2);color:var(--text);}
    .login-err{color:var(--red);font-size:.84rem;margin-top:10px;min-height:1em;}

    /* ── SHELL ── */
    #app{display:none;}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(14,17,23,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;}
    .brand{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;}
    .brand span{color:var(--orange);}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:5px 9px;border-radius:20px;}
    .live-dot .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(46,204,113,.6);animation:pulse 2s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,.5)}70%{box-shadow:0 0 0 7px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}
    .icon-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;}

    /* tab strip */
    .tabs{position:sticky;top:54px;z-index:40;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{flex:0 0 auto;background:transparent;border:1px solid transparent;color:var(--muted);padding:8px 14px;border-radius:10px;font-size:.88rem;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px;}
    .tab.active{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}
    .tab .badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:800;border-radius:10px;padding:1px 6px;}

    main{padding:16px 14px 90px;max-width:1100px;margin:0 auto;}
    .tabpane{display:none;animation:fade .25s ease;}
    .tabpane.active{display:block;}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* ── COMPONENTS ── */
    .sect-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:22px 2px 10px;}
    .sect-title:first-child{margin-top:4px;}
    .grid{display:grid;gap:10px;}
    .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
    .kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
    .kpi .label{font-size:.74rem;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .kpi .val{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;}
    .kpi .val.sm{font-size:1.2rem;}
    .kpi .sub{font-size:.74rem;color:var(--dim);margin-top:3px;}

    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border);width:100%;text-align:left;background:transparent;border-left:none;border-right:none;border-top:none;color:var(--text);transition:background .12s;}
    .row:last-child{border-bottom:none;}
    .row.clickable{cursor:pointer;}
    .row.clickable:hover{background:var(--s2);}
    .row .av{width:38px;height:38px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;color:var(--orange);flex-shrink:0;}
    .row .main{flex:1;min-width:0;}
    .row .t1{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .row .t2{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .row .right{text-align:right;flex-shrink:0;}
    .row .amt{font-weight:800;font-variant-numeric:tabular-nums;}
    .row .chev{color:var(--dim);flex-shrink:0;}

    .pill{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .pill.green{background:var(--green-soft);color:var(--green);}
    .pill.orange{background:var(--orange-soft);color:var(--orange);}
    .pill.red{background:var(--red-soft);color:var(--red);}
    .pill.yellow{background:var(--yellow-soft);color:var(--yellow);}
    .pill.blue{background:var(--blue-soft);color:var(--blue);}
    .pill.grey{background:var(--s3);color:var(--muted);}

    .empty{text-align:center;color:var(--dim);padding:30px 16px;font-size:.88rem;}
    .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .search{flex:1;min-width:160px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-size:16px;outline:none;}
    .chip{background:var(--s1);border:1px solid var(--border);color:var(--muted);padding:8px 13px;border-radius:10px;font-size:.82rem;font-weight:600;white-space:nowrap;}
    .chip.active{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}

    /* bars (stats) */
    .bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
    .bar-row .bl{width:70px;font-size:.78rem;color:var(--muted);flex-shrink:0;}
    .bar-track{flex:1;height:10px;background:var(--s3);border-radius:6px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),#ff8a3d);border-radius:6px;transition:width .6s ease;}
    .bar-row .bv{width:54px;text-align:right;font-size:.78rem;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0;}

    /* ── DETAIL PANEL (slide-in) ── */
    #scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:90;}
    #scrim.open{opacity:1;pointer-events:auto;}
    #panel{position:fixed;z-index:100;background:var(--s1);border-left:1px solid var(--border);box-shadow:var(--shadow);
      top:0;right:0;height:100dvh;width:min(460px,100%);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;}
    #panel.open{transform:none;}
    #sheet{position:fixed;z-index:100;left:0;right:0;bottom:0;background:var(--s1);border-top:1px solid var(--border);border-radius:18px 18px 0 0;box-shadow:var(--shadow);transform:translateY(110%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:6px 12px calc(16px + env(safe-area-inset-bottom));max-height:70vh;overflow-y:auto;}
    #sheet.open{transform:none;}
    #sheet .sheet-handle{width:42px;height:4px;background:var(--border2);border-radius:4px;margin:6px auto 8px;}
    .panel-head{position:sticky;top:0;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:15px 16px;}
    .panel-head h2{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
    .panel-body{padding:16px;overflow-y:auto;flex:1;}
    .drow{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem;}
    .drow:last-child{border-bottom:none;}
    .drow .k{color:var(--muted);flex-shrink:0;}
    .drow .v{text-align:right;font-weight:600;word-break:break-word;}
    .dblock{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:4px 14px;margin:12px 0;}
    .dlabel{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:16px 2px 8px;}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
    .photo-grid img{width:100%;height:90px;object-fit:cover;border-radius:10px;border:1px solid var(--border2);cursor:pointer;}
    .linkbtn{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:9px 13px;border-radius:10px;font-size:.84rem;font-weight:600;text-decoration:none;margin:4px 6px 4px 0;}
    .linkbtn.orange{background:var(--orange-soft);border-color:rgba(232,93,0,.4);color:#fff;}

    /* bottom nav (mobile) */
    .botnav{display:none;}
    @media(max-width:760px){
      .tabs{display:none;}
      main{padding-bottom:78px;}
      .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(20,25,33,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));justify-content:space-around;}
      .botnav button{background:transparent;border:none;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;font-weight:600;padding:4px 8px;flex:1;position:relative;}
      .botnav button .ic{font-size:1.18rem;}
      .botnav button.active{color:var(--orange);}
      .botnav .nbadge{position:absolute;top:0;right:50%;transform:translateX(14px);background:var(--red);color:#fff;font-size:.55rem;font-weight:800;border-radius:10px;padding:0 5px;}
      #panel{width:100%;border-left:none;}
      .kpi .val{font-size:1.35rem;}
    }
    @media(min-width:761px){ .botnav{display:none;} }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <h1>Simple<span style="color:var(--orange)">Trailer</span> CRM</h1>
    <div class="sub">Interner Admin-Zugang</div>
    <div class="field"><label>E-Mail</label><input type="email" id="email" autocomplete="username" placeholder="admin@simpletrailer.de" /></div>
    <div class="field"><label>Passwort</label><input type="password" id="password" autocomplete="current-password" placeholder="••••••••" /></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Anmelden</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">Simple<span>Trailer</span> · CRM</div>
    <div class="topbar-right">
      <span class="live-dot" id="liveDot"><span class="pulse"></span><span id="liveCount">–</span> live</span>
      <button class="icon-btn" onclick="loadAll(true)" title="Aktualisieren">⟳</button>
      <button class="icon-btn" onclick="doLogout()" title="Abmelden">⏻</button>
    </div>
  </div>

  <div class="tabs" id="tabStrip"></div>

  <main>
    <div class="tabpane" id="pane-heute"></div>
    <div class="tabpane" id="pane-buchungen"></div>
    <div class="tabpane" id="pane-kunden"></div>
    <div class="tabpane" id="pane-flotte"></div>
    <div class="tabpane" id="pane-finanzen"></div>
    <div class="tabpane" id="pane-statistik"></div>
    <div class="tabpane" id="pane-aistab"></div>
    <div class="tabpane" id="pane-rechner"></div>
  </main>

  <nav class="botnav" id="botnav"></nav>
</div>

<!-- DETAIL PANEL -->
<div id="scrim" onclick="closePanel()"></div>
<aside id="panel">
  <div class="panel-head"><h2 id="panelTitle">Detail</h2><button class="icon-btn" onclick="closePanel()">✕</button></div>
  <div class="panel-body" id="panelBody"></div>
</aside>
<div id="sheet"><div class="sheet-handle"></div><div id="sheetBody"></div></div>

<script>
  const SUPABASE_URL  = 'https://zcjlfatuelhkghtdyrqh.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_cX1r2GLuIkxEPIpkFKdXaQ_RtP7eDOf';
  const SESSION_KEY   = 'st_admin_session';

  let authToken = null, _refreshTimer = null;
  const ST = { bookings:[], users:[], notify:[], trailers:[], stats:{}, payCache:{} };
  let currentTab = 'heute';

  /* ── HELPERS ── */
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const safeUrl = u => { u=String(u||''); return /^https?:\/\//i.test(u)?esc(u):''; };
  const eur = n => (Number(n)||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  const fmtDate = iso => iso ? new Date(iso).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '–';
  const fmtDay  = iso => iso ? new Date(iso).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) : '–';
  const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
  const initial = s => (String(s||'?').trim()[0]||'?').toUpperCase();
  const isSameDay = (a,b) => a&&b&&new Date(a).toDateString()===new Date(b).toDateString();
  const statusPill = st => {
    const m = { pending:['orange','Ausstehend'], confirmed:['green','Bestätigt'], active:['blue','Aktiv'], returned:['grey','Abgeschlossen'], cancelled:['red','Storniert'] };
    const [c,l] = m[st]||['grey',st||'–']; return `<span class="pill ${c}">${l}</span>`;
  };

  /* ── AUTH (Session-Persistenz + 401-Recovery, wie Haupt-Admin) ── */
  function saveSession(s){try{localStorage.setItem(SESSION_KEY,JSON.stringify(s));}catch(e){}}
  function loadSession(){try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null');}catch(e){return null;}}
  function clearSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}}
  function scheduleRefresh(exp){ if(_refreshTimer)clearTimeout(_refreshTimer); if(!exp)return; const ms=(exp-300)*1000-Date.now(); _refreshTimer=setTimeout(refreshNow,Math.max(5000,Math.min(ms,0x7fffffff))); }
  async function refreshNow(){
    const s=loadSession(); if(!s||!s.refresh_token)return false;
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON},body:JSON.stringify({refresh_token:s.refresh_token})});
      const d=await r.json();
      if(!r.ok||!d.access_token||d.user?.email!=='admin@simpletrailer.de'){clearSession();return false;}
      authToken=d.access_token; saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at,email:d.user.email}); scheduleRefresh(d.expires_at); return true;
    }catch(e){ if(_refreshTimer)clearTimeout(_refreshTimer); _refreshTimer=setTimeout(refreshNow,30000); return false; }
  }
  const _fetch = window.fetch.bind(window);
  window.fetch = async (input,init)=>{
    let res=await _fetch(input,init);
    const url=typeof input==='string'?input:(input&&input.url)||'';
    if(res.status===401&&authToken&&/\/api\//.test(url)){
      if(await refreshNow()){ const ni={...(init||{})}; ni.headers={...((init&&init.headers)||{}),Authorization:`Bearer ${authToken}`}; res=await _fetch(input,ni); }
      else doLogout();
    }
    return res;
  };
  async function doLogin(){
    const email=document.getElementById('email').value.trim(), pass=document.getElementById('password').value;
    const btn=document.getElementById('loginBtn'), err=document.getElementById('loginErr');
    err.textContent=''; btn.disabled=true; btn.textContent='Wird angemeldet…';
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON},body:JSON.stringify({email,password:pass})});
      const d=await r.json(); if(!r.ok)throw new Error(d.error_description||d.msg||'Login fehlgeschlagen');
      if(d.user.email!=='admin@simpletrailer.de')throw new Error('Kein Zugriff auf diesen Bereich.');
      authToken=d.access_token; saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at,email:d.user.email}); scheduleRefresh(d.expires_at); enterApp();
    }catch(e){ err.textContent=e.message; } finally{ btn.disabled=false; btn.textContent='Anmelden'; }
  }
  function doLogout(){ authToken=null; clearSession(); if(_refreshTimer)clearTimeout(_refreshTimer); document.getElementById('app').style.display='none'; document.getElementById('loginView').style.display='flex'; }
  async function tryRestore(){
    const s=loadSession(); if(!s||!s.refresh_token)return;
    const nowSec=Math.floor(Date.now()/1000);
    if(s.access_token&&s.expires_at&&s.expires_at-60>nowSec){authToken=s.access_token;scheduleRefresh(s.expires_at);enterApp();return;}
    if(await refreshNow())enterApp();
  }
  function enterApp(){
    document.getElementById('loginView').style.display='none';
    document.getElementById('app').style.display='block';
    buildNav(); switchTab('heute'); loadAll(); startLive();
  }

  /* ── API ── */
  async function api(section,opts={}){
    const r=await fetch(`/api/admin?section=${section}`,{headers:{Authorization:`Bearer ${authToken}`,...(opts.headers||{})},...opts});
    if(!r.ok) throw new Error('API '+section+' '+r.status);
    return r.json();
  }
  async function loadAll(force){
    try{
      const [data,usersRes,trailersRes]=await Promise.all([
        api('data').catch(()=>({bookings:[],stats:{}})),
        api('users').catch(()=>({users:[],notify:[]})),
        api('trailers').catch(()=>({trailers:[]}))
      ]);
      ST.bookings=data.bookings||[]; ST.stats=data.stats||{};
      ST.users=usersRes.users||[]; ST.notify=usersRes.notify||[];
      ST.trailers=trailersRes.trailers||trailersRes||[];
      renderTab(currentTab); updateBadges();
    }catch(e){ console.error(e); }
  }
  let _liveT=null;
  function startLive(){ const tick=async()=>{ try{const r=await fetch('/api/live-visitors',{headers:{Authorization:`Bearer ${authToken}`}}); const d=await r.json(); document.getElementById('liveCount').textContent=(d.active??d.count??0);}catch(e){} }; tick(); if(_liveT)clearInterval(_liveT); _liveT=setInterval(tick,15000); }

  /* ── NAV ── */
  const TABS=[
    {id:'heute',label:'Heute',ic:'◉'},
    {id:'buchungen',label:'Buchungen',ic:'▤'},
    {id:'kunden',label:'Kunden',ic:'☻'},
    {id:'flotte',label:'Flotte',ic:'▣'},
    {id:'finanzen',label:'Finanzen',ic:'€'},
    {id:'statistik',label:'Statistik',ic:'▦'},
    {id:'aistab',label:'AI-Stab',ic:'✦'},
    {id:'rechner',label:'Rechner',ic:'∑'},
  ];
  const BOTTOM=['heute','buchungen','kunden','finanzen']; // Mobile-Bottom-Nav (+ Mehr-Sheet)
  function buildNav(){
    document.getElementById('tabStrip').innerHTML=TABS.map(t=>`<button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')"><span>${t.ic}</span>${t.label}<span class="badge" id="tb-${t.id}" style="display:none"></span></button>`).join('');
    let bn=BOTTOM.map(id=>{const t=TABS.find(x=>x.id===id);return `<button data-tab="${id}" onclick="switchTab('${id}')"><span class="ic">${t.ic}</span>${t.label}<span class="nbadge" id="nb-${id}" style="display:none"></span></button>`;}).join('');
    bn+=`<button onclick="openMore()"><span class="ic">⋯</span>Mehr</button>`;
    document.getElementById('botnav').innerHTML=bn;
  }
  function openMore(){
    document.getElementById('sheetBody').innerHTML=TABS.filter(t=>!BOTTOM.includes(t.id)).map(t=>`<button class="row clickable" onclick="closePanel();switchTab('${t.id}')"><div class="av">${t.ic}</div><div class="main"><div class="t1">${t.label}</div></div><span class="chev">›</span></button>`).join('');
    document.getElementById('scrim').classList.add('open'); document.getElementById('sheet').classList.add('open');
  }
  function switchTab(id){
    currentTab=id;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
    document.querySelectorAll('.botnav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
    document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
    document.getElementById('pane-'+id).classList.add('active');
    renderTab(id); window.scrollTo({top:0});
  }
  function renderTab(id){ ({heute:renderHeute,buchungen:renderBuchungen,kunden:renderKunden,flotte:renderFlotte,finanzen:renderFinanzen,statistik:renderStatistik,aistab:renderAistab,rechner:renderRechner}[id]||(()=>{}))(); }

  function updateBadges(){
    const now=Date.now();
    const alarms = ST.bookings.filter(b=>b.status==='pending'&&(now-new Date(b.created_at).getTime())>3600000).length
      + ST.bookings.filter(b=>b.status==='active'&&b.end_time&&new Date(b.end_time).getTime()<now).length
      + ST.bookings.filter(b=>String(b.late_fee_payment_intent_id||'').startsWith('FAILED')).length;
    ['tb-heute','nb-heute'].forEach(eid=>{const el=document.getElementById(eid);if(el){el.style.display=alarms?'inline-block':'none';el.textContent=alarms;}});
  }

  /* ── HEUTE ── */
  function renderHeute(){
    const now=Date.now(), today=new Date();
    const pickups=ST.bookings.filter(b=>isSameDay(b.start_time,today)).sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));
    const returns=ST.bookings.filter(b=>isSameDay(b.end_time,today)).sort((a,b)=>new Date(a.end_time)-new Date(b.end_time));
    const revToday=ST.bookings.filter(b=>isSameDay(b.created_at,today)&&['confirmed','active','returned'].includes(b.status)).reduce((s,b)=>s+(b.total_amount||0),0);
    const alarms=[];
    ST.bookings.filter(b=>b.status==='pending'&&(now-new Date(b.created_at).getTime())>3600000).forEach(b=>alarms.push(['red','Seit >1h ausstehend',b]));
    ST.bookings.filter(b=>b.status==='active'&&b.end_time&&new Date(b.end_time).getTime()<now).forEach(b=>alarms.push(['yellow','Überfällige Rückgabe',b]));
    ST.bookings.filter(b=>String(b.late_fee_payment_intent_id||'').startsWith('FAILED')).forEach(b=>alarms.push(['red','Verspätungsgebühr-Abbuchung fehlgeschlagen',b]));

    let h='';
    h+=`<div class="grid kpis">
      <div class="kpi"><div class="label">Umsatz heute</div><div class="val">${eur(revToday)}</div></div>
      <div class="kpi"><div class="label">Abholungen heute</div><div class="val">${pickups.length}</div></div>
      <div class="kpi"><div class="label">Rückgaben heute</div><div class="val">${returns.length}</div></div>
      <div class="kpi"><div class="label">Umsatz Monat</div><div class="val sm">${eur(ST.stats.revenue_month)}</div></div>
    </div>`;

    h+=`<div class="sect-title">⚠️ Sofort prüfen (anklickbar)</div>`;
    h+= alarms.length ? `<div class="card">`+alarms.map(([c,txt,b])=>`
        <button class="row clickable" onclick="openBooking('${b.id}')">
          <div class="av" style="color:var(--${c})">!</div>
          <div class="main"><div class="t1">${txt}</div><div class="t2">${esc(b.customer_name||'–')} · ${esc(b.trailers?.name||'')}</div></div>
          <span class="chev">›</span>
        </button>`).join('')+`</div>`
      : `<div class="card"><div class="empty">Keine offenen Alarme 🎉</div></div>`;

    h+=`<div class="sect-title">📋 Tagesplan heute</div><div id="todoList"><div class="card"><div class="empty">lädt…</div></div></div>`;
    h+=`<div class="sect-title">↑ Abholungen heute</div>`+todayList(pickups,'start_time','Keine Abholungen heute');
    h+=`<div class="sect-title">↓ Rückgaben heute</div>`+todayList(returns,'end_time','Keine Rückgaben heute');
    document.getElementById('pane-heute').innerHTML=h;
    loadTodos();
  }
  async function loadTodos(){
    const el=document.getElementById('todoList'); if(!el)return;
    try{ const d=await api('daily-briefing'); const items=d.items||[];
      if(!document.getElementById('todoList'))return;
      el.innerHTML = items.length ? '<div class="card">'+items.map(it=>`<div class="row"><div class="av" style="color:var(--${it.severity==='red'?'red':'yellow'})">${it.icon||'•'}</div><div class="main"><div class="t1">${esc(it.title||'')}</div><div class="t2" style="white-space:normal">${esc(it.detail||'')}</div></div></div>`).join('')+'</div>' : '<div class="card"><div class="empty">Nichts Offenes für heute 🎉</div></div>';
    }catch(e){ el.innerHTML='<div class="card"><div class="empty">Tagesplan nicht ladbar.</div></div>'; }
  }
  function todayList(arr,tf,emptyMsg){
    if(!arr.length)return `<div class="card"><div class="empty">${emptyMsg}</div></div>`;
    return `<div class="card">`+arr.map(b=>`
      <button class="row clickable" onclick="openBooking('${b.id}')">
        <div class="av">${esc(initial(b.customer_name))}</div>
        <div class="main"><div class="t1">${esc(b.customer_name||'–')}</div><div class="t2">${esc(b.trailers?.name||'')} · ${fmtTime(b[tf])} Uhr</div></div>
        <div class="right">${statusPill(b.status)}</div>
      </button>`).join('')+`</div>`;
  }

  /* ── BUCHUNGEN ── */
  let bookFilter='all', bookSearch='';

    const filters=[['all','Alle'],['pending','Ausstehend'],['confirmed','Bestätigt'],['active','Aktiv'],['returned','Abgeschlossen'],['cancelled','Storniert']];
    let list=ST.bookings.slice();
    if(bookFilter!=='all')list=list.filter(b=>b.status===bookFilter);
    if(bookSearch){const q=bookSearch.toLowerCase();list=list.filter(b=>(b.customer_name||'').toLowerCase().includes(q)||(b.customer_email||'').toLowerCase().includes(q)||(b.id||'').toLowerCase().includes(q));}
    let h=`<div class="toolbar"><input class="search" placeholder="Suche Name / E-Mail / ID…" value="${esc(bookSearch)}" oninput="bookSearch=this.value;renderBuchungen()"></div>`;
    h+=`<div class="toolbar">`+filters.map(([k,l])=>`<button class="chip ${bookFilter===k?'active':''}" onclick="bookFilter='${k}';renderBuchungen()">${l}${k==='all'?` (${ST.bookings.length})`:''}</button>`).join('')+`</div>`;
    h+= list.length ? `<div class="card">`+list.map(b=>`
      <button class="row clickable" onclick="openBooking('${b.id}')">
        <div class="av">${esc(initial(b.customer_name))}</div>
        <div class="main"><div class="t1">${esc(b.customer_name||'–')}</div><div class="t2">${fmtDay(b.start_time)} · ${esc(b.trailers?.name||'')} · #${(b.id||'').slice(0,8).toUpperCase()}</div></div>
        <div class="right"><div class="amt">${eur((b.total_amount||0)+(b.late_fee_amount||0))}</div><div style="margin-top:3px">${statusPill(b.status)}</div></div>
      </button>`).join('')+`</div>`
      : `<div class="card"><div class="empty">Keine Buchungen.</div></div>`;
    document.getElementById('pane-buchungen').innerHTML=h;
  }

  /* ── KUNDEN ── */
  let custFilter='all', custSearch='';

    let list=ST.users.slice();

    if(custFilter==='kunden')list=list.filter(u=>(u.bookings_count||0)>0);
    if(custFilter==='unverif')list=list.filter(u=>u.dl_status!=='verified');

    let h=`<div class="grid kpis">
      <div class="kpi"><div class="label">Kunden gesamt</div><div class="val">${ST.users.length}</div></div>
      <div class="kpi"><div class="label">Mit Buchung</div><div class="val">${ST.users.filter(u=>(u.bookings_count||0)>0).length}</div></div>
      <div class="kpi"><div class="label">Offene Leads</div><div class="val" style="color:var(--yellow)">${leads}</div></div>
      <div class="kpi"><div class="label">Notify-Liste</div><div class="val sm">${ST.notify.length}</div></div>
    </div>`;
    h+=`<div class="toolbar"><input class="search" placeholder="Kunde suchen…" value="${esc(custSearch)}" oninput="custSearch=this.value;renderKunden()"></div>`;
    h+=`<div class="toolbar">`+[['all','Alle'],['kunden','Kunden'],['leads','Leads'],['unverif','Unverifiziert']].map(([k,l])=>`<button class="chip ${custFilter===k?'active':''}" onclick="custFilter='${k}';renderKunden()">${l}</button>`).join('')+`</div>`;
    h+= list.length ? `<div class="card">`+list.map(u=>`
      <button class="row clickable" onclick="openCustomer('${esc(u.email)}')">
        <div class="av">${esc(initial(u.first_name||u.email))}</div>
        <div class="main"><div class="t1">${esc(([u.first_name,u.last_name].filter(Boolean).join(' '))||u.email)}</div><div class="t2">${esc(u.email)} · ${u.bookings_count||0} Buchung(en)</div></div>
        <div class="right">${u.dl_status==='verified'?'<span class="pill green">✓ verif.</span>':'<span class="pill grey">○</span>'}</div>
      </button>`).join('')+`</div>`
      : `<div class="card"><div class="empty">Keine Kunden.</div></div>`;
    document.getElementById('pane-kunden').innerHTML=h;
  }

  /* ── FLOTTE ── */
  function renderFlotte(){
    let h=`<div class="sect-title">📍 Live-Standorte (GPS)</div>`;
    h+=`<div id="theftAlerts"></div>`;
    h+=`<div id="flotteMap" style="height:300px;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--s2)"></div>`;
    h+=`<div class="sect-title">Anhänger</div><div id="flotteCards"></div>`;
    h+=`<div class="sect-title">Offene Schäden (alle)</div><div id="flotteDamages"><div class="card"><div class="empty">lädt…</div></div></div>`;
    document.getElementById('pane-flotte').innerHTML=h;
    renderFlotteCards(); loadFlotteGps(); loadFlotteDamages();
  }
  function renderFlotteCards(){
    const el=document.getElementById('flotteCards'); if(!el)return;
    el.innerHTML = ST.trailers.length ? ST.trailers.map(t=>{
      const open=ST.bookings.filter(b=>b.trailers&&b.trailers.name===t.name&&['confirmed','active'].includes(b.status)).length;
      const tuev=t.next_tuev_date?' · TÜV '+fmtDay(t.next_tuev_date):'';
      return `<div class="card" style="margin-bottom:10px"><button class="row clickable" onclick="openTrailer('${esc(t.id||t.name)}')"><div class="av">▣</div><div class="main"><div class="t1">${esc(t.name||'Anhänger')}</div><div class="t2">${esc(t.type||'Anhänger')} · ${open} aktive Buchung(en)${tuev}</div></div><div class="right">${t.is_available?'<span class="pill green">Verfügbar</span>':'<span class="pill yellow">Belegt/Gesperrt</span>'}</div></button></div>`;
    }).join('') : `<div class="card"><div class="empty">Keine Anhänger geladen.</div></div>`;
  }
  let _fmap=null, _fmapTries=0;
  function loadFlotteGps(){
    api('trailer-positions').then(d=>{
      const pos=(d.trailers||[]).filter(t=>t.last_lat&&t.last_lng);
      const ta=d.open_theft_alerts||[]; const taEl=document.getElementById('theftAlerts');
      if(taEl)taEl.innerHTML = ta.length ? '<div class="card" style="border-color:rgba(255,93,93,.5);margin-bottom:8px">'+ta.map(a=>`<div class="row"><div class="av" style="color:var(--red)">⚠</div><div class="main"><div class="t1">Diebstahl-Alarm: ${esc(a.trailer_name||a.trailer_id||'')}</div><div class="t2">${a.triggered_at?fmtDate(a.triggered_at):''} · ${esc(a.reason||a.type||'')}</div></div></div>`).join('')+'</div>' : '';
      initFmap(pos);
    }).catch(()=>initFmap((ST.trailers||[]).filter(t=>t.last_lat&&t.last_lng)));
  }
  function initFmap(pos){
    const el=document.getElementById('flotteMap'); if(!el)return;
    if(typeof L==='undefined'){ if(_fmapTries++<20)setTimeout(()=>initFmap(pos),250); return; }
    if(_fmap){try{_fmap.remove();}catch(e){} _fmap=null;}
    const center=pos.length?[pos[0].last_lat,pos[0].last_lng]:[53.0793,8.8017];
    _fmap=L.map(el,{attributionControl:false}).setView(center,pos.length?12:11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_fmap);
    const markers=pos.map(t=>{const m=L.marker([t.last_lat,t.last_lng]).addTo(_fmap); m.bindPopup(`<b>${esc(t.name||'')}</b><br>${t.last_seen_at?'zuletzt '+fmtDate(t.last_seen_at):'—'}${t.last_battery_percent!=null?'<br>🔋 '+t.last_battery_percent+'%':''}${t.last_speed_kmh?'<br>'+t.last_speed_kmh+' km/h':''}`); return m;});
    if(markers.length>1){try{_fmap.fitBounds(L.featureGroup(markers).getBounds().pad(0.3));}catch(e){}}
    setTimeout(()=>{try{_fmap&&_fmap.invalidateSize();}catch(e){}},250);
  }
  async function loadFlotteDamages(){
    const el=document.getElementById('flotteDamages'); if(!el)return;
    try{ const d=await api('damages'); const open=(d.damages||[]).filter(x=>x.status==='open');
      if(!document.getElementById('flotteDamages'))return;
      el.innerHTML = open.length ? '<div class="card">'+open.map(x=>{const tn=(ST.trailers.find(t=>t.id===x.trailer_id)||{}).name||'';return `<button class="row clickable" onclick="openTrailer('${esc(x.trailer_id)}')"><div class="av" style="color:var(--${x.severity==='not_drivable'?'red':x.severity==='major'?'yellow':'muted'})">!</div><div class="main"><div class="t1">${esc((x.description||'').slice(0,70))}</div><div class="t2">${esc(tn)} · ${esc(x.source||'')} · ${x.created_at?fmtDay(x.created_at):''}</div></div><span class="chev">›</span></button>`;}).join('')+'</div>' : '<div class="card"><div class="empty">Keine offenen Schäden 🎉</div></div>';
    }catch(e){ if(el)el.innerHTML='<div class="card"><div class="empty">Fehler.</div></div>'; }
  }

  /* ── FINANZEN ── */
  let finPeriod='monat';
  function finFrom(p){ const n=new Date(); if(p==='heute')return new Date(n.getFullYear(),n.getMonth(),n.getDate()); if(p==='woche'){const f=new Date(n);f.setDate(n.getDate()-6);f.setHours(0,0,0,0);return f;} if(p==='monat')return new Date(n.getFullYear(),n.getMonth(),1); if(p==='jahr')return new Date(n.getFullYear(),0,1); return new Date(0); }
  function renderFinanzen(){
    const periods=[['heute','Heute'],['woche','7 Tage'],['monat','Monat'],['jahr','Jahr'],['gesamt','Gesamt']];
    const from=finFrom(finPeriod);
    const paid=ST.bookings.filter(b=>['confirmed','active','returned'].includes(b.status)&&new Date(b.created_at)>=from);
    const rev=paid.reduce((s,b)=>s+(b.total_amount||0)+(b.late_fee_amount||0),0);
    const insRev=paid.reduce((s,b)=>s+(b.insurance_amount||0),0);
    const txns=paid.length, net=rev/1.19, vat=rev-net, fee=rev*0.015+txns*0.25, avg=txns?rev/txns:0;
    let h=`<div class="toolbar">`+periods.map(([k,l])=>`<button class="chip ${finPeriod===k?'active':''}" onclick="finPeriod='${k}';renderFinanzen()">${l}</button>`).join('')+`</div>`;
    h+=`<div class="grid kpis">
      <div class="kpi"><div class="label">Umsatz (brutto)</div><div class="val">${eur(rev)}</div><div class="sub">${txns} bezahlte Buchungen</div></div>
      <div class="kpi"><div class="label">Ø Buchungswert</div><div class="val sm">${eur(avg)}</div></div>
      <div class="kpi"><div class="label">Schutzpaket-Umsatz</div><div class="val sm">${eur(insRev)}</div></div>
    </div>`;
    h+=`<div class="sect-title">Aufschlüsselung (geschätzt)</div><div class="card">
      <div class="row"><div class="main"><div class="t1">Netto-Umsatz</div><div class="t2">ohne MwSt</div></div><div class="right amt">${eur(net)}</div></div>
      <div class="row"><div class="main"><div class="t1">MwSt (19 %)</div><div class="t2">ans Finanzamt</div></div><div class="right amt" style="color:var(--yellow)">${eur(vat)}</div></div>
      <div class="row"><div class="main"><div class="t1">Stripe-Gebühren (ca.)</div><div class="t2">~1,5 % + 0,25 €/Buchung</div></div><div class="right amt" style="color:var(--red)">−${eur(fee)}</div></div>
    </div>`;
    const ib=paid.filter(b=>b.insurance_type==='basis').length, ip=paid.filter(b=>b.insurance_type==='premium').length, inone=paid.filter(b=>!b.insurance_type||b.insurance_type==='none').length;
    h+=`<div class="sect-title">Schutzpaket-Wahl</div><div class="card" style="padding:14px 16px">${barChart([['Basis',ib],['Premium',ip],['Keins',inone]])}</div>`;
    h+=`<div style="color:var(--dim);font-size:.78rem;margin-top:12px;padding:0 4px">💡 Zeitraum: ${periods.find(p=>p[0]===finPeriod)[1]} · Zahlart pro Buchung im Detail (live aus Stripe). MwSt/Gebühr = Schätzwerte.</div>`;
    document.getElementById('pane-finanzen').innerHTML=h;
  }

  /* ── STATISTIK ── */
  function renderStatistik(){
    const paid=ST.bookings.filter(b=>['confirmed','active','returned'].includes(b.status));
    const wd=['So','Mo','Di','Mi','Do','Fr','Sa'], wdC=[0,0,0,0,0,0,0];
    paid.forEach(b=>{if(b.start_time)wdC[new Date(b.start_time).getDay()]++;});
    const order=[1,2,3,4,5,6,0];
    const byTrailer={}; paid.forEach(b=>{const n=b.trailers?.name||'?';byTrailer[n]=(byTrailer[n]||0)+1;});
    // Umsatz letzte 6 Monate
    const months=[]; const nowM=new Date();
    for(let i=5;i>=0;i--){const d=new Date(nowM.getFullYear(),nowM.getMonth()-i,1);months.push([d,0]);}
    paid.forEach(b=>{const c=new Date(b.created_at);months.forEach(m=>{if(c.getFullYear()===m[0].getFullYear()&&c.getMonth()===m[0].getMonth())m[1]+=(b.total_amount||0);});});
    let h=`<div class="sect-title">Umsatz – letzte 6 Monate</div><div class="card" style="padding:14px 16px">${barChart(months.map(m=>[m[0].toLocaleDateString('de-DE',{month:'short'}),m[1]]),v=>eur(v))}</div>`;
    h+=`<div class="sect-title">Buchungen nach Wochentag</div><div class="card" style="padding:14px 16px">${barChart(order.map(i=>[wd[i],wdC[i]]))}</div>`;
    h+=`<div class="sect-title">Anhänger-Auslastung</div><div class="card" style="padding:14px 16px">${barChart(Object.entries(byTrailer))}</div>`;
    document.getElementById('pane-statistik').innerHTML=h;
  }
  function barChart(rows,fmt){
    const max=Math.max(1,...rows.map(r=>r[1]));
    return rows.map(([l,v])=>`<div class="bar-row"><div class="bl">${esc(l)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div><div class="bv">${fmt?fmt(v):v}</div></div>`).join('')||'<div class="empty">Keine Daten.</div>';
  }

  /* ── MEHR ── */
  /* ── DRILL-DOWN PANELS ── */
  function openPanel(title,html){ document.getElementById('panelTitle').textContent=title; document.getElementById('panelBody').innerHTML=html; document.getElementById('scrim').classList.add('open'); document.getElementById('panel').classList.add('open'); }
  function closePanel(){ document.getElementById('scrim').classList.remove('open'); document.getElementById('panel').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); }

  function openBooking(id){
    const b=ST.bookings.find(x=>x.id===id); if(!b)return;
    const drow=(k,v)=>`<div class="drow"><span class="k">${k}</span><span class="v">${v}</span></div>`;
    const late=(b.late_fee_amount||0)>0;
    const photos=[['Vorab',b.precheck_photo_url],['Rückgabe',b.return_photo_url],['Ladefläche',b.ladeflaeche_photo_url]].filter(p=>safeUrl(p[1]));
    let h=`<div style="margin-bottom:6px">${statusPill(b.status)} <span class="mono" style="color:var(--dim);font-size:.8rem">#${(b.id||'').slice(0,8).toUpperCase()}</span></div>`;
    h+=`<div class="dblock">
      <div class="drow"><span class="k">Kunde</span><span class="v">${esc(b.customer_name||'–')}</span></div>
      ${b.customer_email?`<div class="drow"><span class="k">Kontakt</span><span class="v">${esc(b.customer_email)}<br>${esc(b.customer_phone||'')}</span></div>`:''}
    </div>`;
    h+=`<button class="linkbtn orange" onclick="openCustomer('${esc(b.customer_email)}')">☻ Zum Kundenprofil ›</button>`;
    h+=`<div class="dblock">
      ${drow('Zeitraum',`${fmtDate(b.start_time)}<br>→ ${fmtDate(b.end_time)}`)}
      ${drow('Anhänger',esc(b.trailers?.name||'–'))}
      ${b.access_code?drow('Zugangscode',`<span class="mono">${esc(b.access_code)}</span>`):''}
      ${b.actual_return_time?drow('Zurückgegeben',fmtDate(b.actual_return_time)):''}
      ${late?drow('Verspätungsgebühr',`<span style="color:var(--yellow)">${eur(b.late_fee_amount)}</span>`):''}
    </div>`;
    h+=`<div class="dlabel">💳 Zahlung</div><div class="dblock" id="payBlock">
      ${drow('Betrag',`<strong>${eur((b.total_amount||0)+(b.late_fee_amount||0))}</strong> <span style="color:var(--dim);font-size:.78rem">inkl. MwSt</span>`)}
      ${drow('Miete + Schutz',`${eur((b.total_amount||0)-(b.insurance_amount||0))} + ${eur(b.insurance_amount)}`)}
      <div class="drow"><span class="k">Methode</span><span class="v" id="payMethod">⏳ lädt…</span></div>
      <div class="drow"><span class="k">Status</span><span class="v" id="payStatus">⏳</span></div>
    </div>`;
    if(photos.length){ h+=`<div class="dlabel">📸 Fotos</div><div class="photo-grid">`+photos.map(p=>`<a href="${safeUrl(p[1])}" target="_blank"><img src="${safeUrl(p[1])}" alt="${p[0]}" title="${p[0]}"></a>`).join('')+`</div>`; }

      <button class="linkbtn" onclick="sendKulanz('${b.id}')">✉️ Kulanz-Mail</button>

  async function loadPayment(b){
    const mEl=document.getElementById('payMethod'), sEl=document.getElementById('payStatus');
    if(!b.stripe_payment_intent_id){ if(mEl)mEl.textContent='—'; if(sEl)sEl.innerHTML=statusPill(b.status); return; }
    try{
      const pi=ST.payCache[b.stripe_payment_intent_id] || await api('payment-info&pi='+encodeURIComponent(b.stripe_payment_intent_id));
      ST.payCache[b.stripe_payment_intent_id]=pi;
      if(!document.getElementById('payMethod'))return;
      if(pi.error){ document.getElementById('payMethod').textContent='Stripe n/a'; document.getElementById('payStatus').innerHTML=statusPill(b.status); return; }
      document.getElementById('payMethod').textContent=pi.method_label||pi.method_type||'–';
      const ok = pi.status==='succeeded' && !pi.refunded;
      let badge = pi.refunded ? `<span class="pill red">Erstattet (${eur(pi.amount_refunded)})</span>`
        : ok ? `<span class="pill green">✓ Bezahlt</span>`
        : `<span class="pill yellow">${esc(pi.status)}</span>`;
      document.getElementById('payStatus').innerHTML=badge;
    }catch(e){ if(document.getElementById('payMethod'))document.getElementById('payMethod').textContent='Fehler'; }
  }

  async function verifyManual(uid){
    if(!confirm('Führerschein MANUELL als verifiziert markieren?\n\n⚠️ NUR wenn du den echten Führerschein geprüft hast UND Stripe KEINEN Betrug/Fälschung gemeldet hat.'))return;

    }catch(e){ alert('❌ '+e.message); }

  async function loadTrDamages(tid){

      const dm=(d.damages||[]).filter(x=>x.status==='open');
      if(!document.getElementById('trDamages'))return;
      el.innerHTML = dm.length ? '<div class="card">'+dm.map(x=>`<div class="row" style="display:block">

        <div style="font-size:.86rem;margin:6px 0">${esc(x.description||'')}</div>
        <div style="font-size:.74rem;color:var(--dim);margin-bottom:6px">Quelle: ${esc(x.source||'–')}${x.reported_by?' · '+esc(x.reported_by):''}</div>
        ${safeUrl(x.photo_url)?`<a class="linkbtn" href="${safeUrl(x.photo_url)}" target="_blank">📷 Foto</a>`:''}
        <div style="margin-top:6px"><button class="chip active" onclick="resolveDmg('${x.id}','resolved','${tid}')">✓ Erledigt</button> <button class="chip" onclick="resolveDmg('${x.id}','wont_fix','${tid}')">akzeptiert</button></div>
      </div>`).join('')+'</div>' : '<div class="card"><div class="empty">Keine offenen Schäden 🎉</div></div>';
    }catch(e){ if(el)el.innerHTML='<div class="card"><div class="empty">Fehler beim Laden.</div></div>'; }

  async function resolveDmg(id,status,tid){
    const note=prompt(status==='resolved'?'Notiz zur Behebung (optional):':'Grund (optional):');
    try{ const r=await fetch('/api/damages',{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:`Bearer ${authToken}`},body:JSON.stringify({id,status,resolved_note:note||undefined})}); if(!r.ok)throw new Error((await r.json()).error||'Fehler'); loadTrDamages(tid); }catch(e){alert('❌ '+e.message);}
  }
  async function saveTrailerDates(tid){

  }

  /* ── AI-STAB (Agenten-Chat + Inbox) ── */
  const AGENTS=[['consultant','💡 Strategie-Berater'],['ads-specialist','📈 Werbe-Profi'],['content-writer','📝 Texter'],['support-writer','💬 Kunden-Antworter'],['legal-checker','⚖️ Rechts-Prüfer'],['bug-triager','🐛 Fehler-Sortierer'],['competitor-watcher','🔭 Konkurrenz-Wächter'],['mobile-app-architect','📱 App-Architekt'],['budget-optimizer','💰 Budget-Planer'],['code-reviewer','🔍 Code-Prüfer']];
  const CK=a=>`st_chat_${a}`;
  function renderAistab(){
    let h=`<div class="sect-title">Agent fragen</div><div class="card" style="padding:14px 16px">
      <select id="aiAgent" onchange="aiLoadConv()" style="width:100%;background:var(--s2);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:11px 12px;font-size:15px;margin-bottom:10px">${AGENTS.map(a=>`<option value="${a[0]}">${a[1]}</option>`).join('')}</select>
      <div id="aiChat" style="max-height:340px;overflow-y:auto;margin-bottom:10px;display:none"></div>
      <textarea id="aiQ" rows="3" placeholder="Frage… (Strg+Enter sendet)" style="width:100%;background:var(--s2);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:11px 12px;font-size:15px;resize:vertical;margin-bottom:8px" onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')aiSend()"></textarea>
      <div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" id="aiBtn" onclick="aiSend()">Fragen →</button><button class="btn btn-ghost" onclick="aiReset()" title="Konversation löschen">↺</button></div>
      <div id="aiResult" style="font-size:.84rem;color:var(--muted);margin-top:8px"></div>
    </div>
    <div class="sect-title">Inbox <span style="color:var(--dim);font-weight:600;text-transform:none;letter-spacing:0">· Drafts / Posts / Insights</span></div>
    <div id="aiInbox"><div class="card"><div class="empty">lädt…</div></div></div>`;
    document.getElementById('pane-aistab').innerHTML=h;
    aiLoadConv(); aiLoadInbox();
  }
  function aiLoadConv(){ const a=document.getElementById('aiAgent').value; let c=[]; try{c=JSON.parse(localStorage.getItem(CK(a))||'[]');}catch(e){} aiRenderChat(c); }
  function aiRenderChat(c){ const box=document.getElementById('aiChat'); if(!box)return; if(!c.length){box.style.display='none';box.innerHTML='';return;} box.style.display='block'; box.innerHTML=c.map(m=>{const u=m.role==='user';return `<div style="background:${u?'var(--s2)':'var(--blue-soft)'};border:1px solid ${u?'var(--border)':'rgba(77,163,255,.3)'};border-radius:10px;padding:9px 12px;margin-bottom:8px"><div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:${u?'var(--dim)':'var(--blue)'};margin-bottom:3px">${u?'Du':'Agent'}</div><div style="font-size:.88rem;line-height:1.55;white-space:${u?'pre-wrap':'normal'}">${u?esc(m.content):m.content}</div></div>`;}).join(''); box.scrollTop=box.scrollHeight; }
  async function aiSend(){
    const a=document.getElementById('aiAgent').value, q=document.getElementById('aiQ').value.trim(), btn=document.getElementById('aiBtn'), res=document.getElementById('aiResult');
    if(!q){res.textContent='Bitte Frage eingeben.';return;}
    let c=[]; try{c=JSON.parse(localStorage.getItem(CK(a))||'[]');}catch(e){}
    c.push({role:'user',content:q}); aiRenderChat(c); document.getElementById('aiQ').value=''; btn.disabled=true; btn.textContent='Agent denkt…'; res.textContent='⏳ 5–15 Sek…';
    try{
      const r=await fetch('/api/admin?section=direct-ask',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${authToken}`},body:JSON.stringify({agent:a,messages:c})});
      const d=await r.json(); if(!r.ok)throw new Error(d.error||'Fehler');
      c.push({role:'assistant',content:d.answer||''}); if(c.length>20)c=c.slice(-20); localStorage.setItem(CK(a),JSON.stringify(c)); aiRenderChat(c); res.textContent='';
    }catch(e){ res.innerHTML=`<span style="color:var(--red)">${esc(e.message)}</span>`; }
    finally{ btn.disabled=false; btn.textContent='Fragen →'; }
  }
  function aiReset(){ const a=document.getElementById('aiAgent').value; if(!confirm('Konversation löschen?'))return; localStorage.removeItem(CK(a)); aiRenderChat([]); document.getElementById('aiResult').innerHTML=''; }
  async function aiLoadInbox(){
    const box=document.getElementById('aiInbox'); if(!box)return;
    try{
      const d=await api('ai-inbox'); const items=d.items||[];
      if(!document.getElementById('aiInbox'))return;
      box.innerHTML = items.length ? '<div class="card">'+items.map(it=>{
        const k={'content-draft':['📝 Draft','blue'],'social-post':['📱 Insta-Post','yellow'],'ai-insight':['💡 Insight','blue']}[it.kind]||[it.kind,'grey'];
        return `<div class="row" style="display:block"><div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px"><span class="pill ${k[1]}">${k[0]}</span><span style="font-size:.7rem;color:var(--dim)">${it.created_at?fmtDate(it.created_at):''}</span></div><div style="font-weight:600;font-size:.9rem;margin-bottom:4px">${esc(it.title||'—')}</div><div style="font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:8px">${esc((it.summary||'').slice(0,200))}${(it.summary||'').length>200?'…':''}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${aiActions(it)}</div></div>`;
      }).join('')+'</div>' : '<div class="card"><div class="empty">📬 Alles erledigt.</div></div>';
    }catch(e){ if(box)box.innerHTML=`<div class="card"><div class="empty">Fehler: ${esc(e.message)}</div></div>`; }
  }
  function aiActions(it){ const b=(act,lbl,on)=>`<button class="chip ${on?'active':''}" onclick="aiAction('${it.kind}','${it.id}','${act}')">${lbl}</button>`;
    if(it.kind==='social-post')return b('approve','✓ Gepostet',1)+b('skip','Skip');
    if(it.kind==='content-draft')return b('approve','✓ Approve',1)+b('reject','Reject');
    if(it.kind==='ai-insight')return b('acknowledge','✓ Verstanden',1);
    return ''; }
  async function aiAction(kind,id,action){ try{ const r=await fetch('/api/admin?section=inbox-action',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${authToken}`},body:JSON.stringify({kind,id,action})}); if(!r.ok)throw new Error((await r.json()).error||'Fehler'); aiLoadInbox(); }catch(e){alert('❌ '+e.message);} }

  /* ── RECHNER (Business-/Break-Even-Kalkulator) ── */
  const R_DEF={anzahlAnhaenger:20,auslastung:30,mietPreis:28,anschaffung:700,finanziert:false,zinssatz:8,laufzeit:48,versicherung:21,wartung:13,tuev:3,tracker:5,verschleiss:8,marketing:10,stellplatz:0,steuerberater:125,tools:80,haftpflicht:33,sonstiges:60,steuerKvSatz:30,nettoProPerson:1800};
  const R_INPUTS=[['anzahlAnhaenger','Anzahl Anhänger',1,100,1,''],['auslastung','Auslastung',0,100,1,'%'],['mietPreis','Ø Mietpreis/Tag',10,80,1,'€'],['anschaffung','Anschaffung/Anhänger',300,3000,50,'€'],['versicherung','Versicherung/Anh./Mon.',0,100,1,'€'],['wartung','Wartung/Anh./Mon.',0,100,1,'€'],['tuev','TÜV/Anh./Mon.',0,50,1,'€'],['tracker','GPS-Tracker/Anh./Mon.',0,50,1,'€'],['verschleiss','Verschleiß/Anh./Mon.',0,100,1,'€'],['marketing','Marketing/Anh./Mon.',0,100,1,'€'],['stellplatz','Stellplatz/Anh./Mon.',0,200,5,'€'],['steuerberater','Steuerberater/Mon.',0,500,5,'€'],['tools','Tools/Software/Mon.',0,500,5,'€'],['haftpflicht','Betriebshaftpflicht/Mon.',0,200,1,'€'],['sonstiges','Sonstiges/Mon.',0,500,10,'€'],['steuerKvSatz','Steuer + KV-Satz',0,60,1,'%'],['nettoProPerson','Netto-Ziel/Person/Mon.',0,5000,100,'€']];
  let RST={...R_DEF}, _rLoaded=false, _rSaveT=null;
  const rfn=n=>new Intl.NumberFormat('de-DE',{maximumFractionDigits:0}).format(Math.round(n||0));
  async function renderRechner(){
    if(!_rLoaded){ try{const d=await api('calculator-state'); RST={...R_DEF,...(d.state||{})};}catch(e){RST={...R_DEF};} _rLoaded=true; }
    let h=`<div id="rOut"></div>`;
    h+=`<div class="sect-title">Finanzierung</div><div class="dblock" style="padding:12px 14px"><div style="display:flex;gap:8px;${RST.finanziert?'margin-bottom:10px':''}"><button class="chip ${!RST.finanziert?'active':''}" onclick="RST.finanziert=false;renderRechner();rDebSave()">Cash (AfA)</button><button class="chip ${RST.finanziert?'active':''}" onclick="RST.finanziert=true;renderRechner();rDebSave()">Finanziert</button></div>${RST.finanziert?rInputRow(['zinssatz','Zinssatz',0,15,0.5,'%'])+rInputRow(['laufzeit','Laufzeit',12,84,6,'Mon']):''}</div>`;
    h+=`<div class="sect-title">Eingaben</div><div class="dblock" style="padding:12px 14px">${R_INPUTS.map(rInputRow).join('')}</div>`;
    h+=`<button class="btn btn-ghost" style="margin-top:12px" onclick="RST={...R_DEF};renderRechner();rDebSave()">Zurücksetzen</button>`;
    document.getElementById('pane-rechner').innerHTML=h; rUpdateOutput();
  }
  function rInputRow([key,lbl,min,max,step,unit]){ const v=RST[key]??0; return `<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><label style="font-size:.74rem;color:var(--muted)">${lbl}</label><span style="display:flex;align-items:center;gap:5px"><input type="number" value="${v}" step="${step}" onchange="RST['${key}']=parseFloat(this.value)||0;rUpdateOutput();rDebSave()" style="width:80px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:4px 8px;text-align:right;font-family:var(--mono);font-size:.85rem"><span style="font-size:.7rem;color:var(--dim);min-width:26px">${unit}</span></span></div><input type="range" min="${min}" max="${max}" step="${step}" value="${Math.max(min,Math.min(max,v))}" oninput="RST['${key}']=parseFloat(this.value);rUpdateOutput();rDebSave()" style="width:100%;accent-color:var(--orange)"></div>`; }
  function rUpdateOutput(){ const el=document.getElementById('rOut'); if(!el)return; const c=rCompute(); const ok=c.ueberschussNetto>=0;
    let h=`<div class="kpi" style="border-color:${ok?'rgba(46,204,113,.45)':'rgba(255,93,93,.45)'}"><div class="label">Monats-Überschuss (beide, nach Steuer/KV)</div><div class="val" style="color:${ok?'var(--green)':'var(--red)'}">${(c.ueberschussNetto>=0?'+':'')+rfn(c.ueberschussNetto)} €</div><div class="sub">Netto/Person ${rfn(c.nettoProPersonMonat)} € · Ziel ${rfn(RST.nettoProPerson)} €/Person</div></div>`;
    h+=`<div class="grid kpis" style="margin-top:10px"><div class="kpi"><div class="label">EBIT / Monat</div><div class="val sm">${rfn(c.ebitMonat)} €</div></div><div class="kpi"><div class="label">DB / Anhänger</div><div class="val sm">${rfn(c.dbProAnh)} €</div></div><div class="kpi"><div class="label">Umsatz / Jahr</div><div class="val sm">${rfn(c.umsatzJahr)} €</div></div><div class="kpi"><div class="label">Invest gesamt</div><div class="val sm">${rfn(c.gesamtInvest)} €</div></div></div>`;
    if(!ok&&isFinite(c.benoetigteAnhaenger))h+=`<div class="card" style="padding:12px 14px;margin-top:10px;color:var(--yellow);font-size:.84rem">Für dein Ziel: ca. <strong>${Math.ceil(c.benoetigteAnhaenger)}</strong> Anhänger${c.altPreis?` · oder ~${rfn(c.altPreis)} €/Tag Miete`:''}${c.altAuslastung&&c.altAuslastung<=100?` · oder ~${Math.round(c.altAuslastung)}% Auslastung`:''}.</div>`;
    el.innerHTML=h;
  }
  function rDebSave(){ if(_rSaveT)clearTimeout(_rSaveT); _rSaveT=setTimeout(async()=>{try{await fetch('/api/admin?section=calculator-state-save',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${authToken}`},body:JSON.stringify({state:RST})});}catch(e){}},1200); }
  function rCompute(){ const s=RST; const tageProMonat=30.4*(s.auslastung/100); const umsatzBruttoProAnh=tageProMonat*s.mietPreis; const umsatzNettoProAnh=umsatzBruttoProAnh/1.19; let kapitalkosten; if(s.finanziert){const m=s.zinssatz/100/12; kapitalkosten=m>0?(s.anschaffung*m)/(1-Math.pow(1+m,-s.laufzeit)):s.anschaffung/s.laufzeit;}else{kapitalkosten=s.anschaffung/60;} const direktKostenProAnh=s.versicherung+s.wartung+s.tuev+s.tracker+s.verschleiss+s.marketing+s.stellplatz+kapitalkosten; const dbProAnh=umsatzNettoProAnh-direktKostenProAnh; const dbMonat=dbProAnh*s.anzahlAnhaenger; const fixkostenMonat=s.steuerberater+s.tools+s.haftpflicht+s.sonstiges; const ebitMonat=dbMonat-fixkostenMonat; const nettoBeideMonat=ebitMonat*(1-s.steuerKvSatz/100); const nettoProPersonMonat=nettoBeideMonat/2; const bedarfBeide=s.nettoProPerson*2; const ueberschussNetto=nettoBeideMonat-bedarfBeide; const benoetigterDbProMonat=bedarfBeide/(1-s.steuerKvSatz/100)+fixkostenMonat; const benoetigteAnhaenger=dbProAnh>0?benoetigterDbProMonat/dbProAnh:Infinity; let altPreis=null,altAuslastung=null; if(ueberschussNetto<0&&dbProAnh>0){const fvs=-ueberschussNetto/(1-s.steuerKvSatz/100); const fpapm=fvs/s.anzahlAnhaenger; altPreis=s.mietPreis+(tageProMonat>0?(fpapm/tageProMonat)*1.19:0); altAuslastung=((tageProMonat+(fpapm/(s.mietPreis/1.19)))/30.4)*100;} return {dbProAnh,ebitMonat,nettoProPersonMonat,ueberschussNetto,benoetigteAnhaenger,gesamtInvest:s.anschaffung*s.anzahlAnhaenger,umsatzJahr:umsatzBruttoProAnh*s.anzahlAnhaenger*12,altPreis,altAuslastung}; }

  document.addEventListener('keydown',e=>{ if(e.key==='Escape')closePanel(); if(e.key==='Enter'&&document.getElementById('loginView').style.display!=='none')doLogin(); });
  tryRestore();
</script>
