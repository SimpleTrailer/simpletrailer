<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Seite nicht gefunden – SimpleTrailer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0D0D; color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
    }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: 32px; }
    .logo span:last-child { color: #E85D00; }
    h1 {
      font-size: 4.5rem; font-weight: 900; letter-spacing: -.05em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #E85D00, #FF6A00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 14px; }
    p { color: #888; font-size: 1rem; margin-bottom: 28px; max-width: 440px; line-height: 1.6; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-block; padding: 14px 28px;
      border-radius: 12px; font-weight: 700; font-size: .95rem;
      text-decoration: none; transition: transform .1s, background .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-orange { background: #E85D00; color: #fff; }
    .btn-orange:hover { background: #FF6A00; }
    .btn-ghost { background: transparent; color: #aaa; border: 1.5px solid #383838; }
    .btn-ghost:hover { color: #fff; border-color: #555; }
  </style>
</head>
<body>
  <div class="logo"><span>Simple</span><span>Trailer</span></div>
  <h1>404</h1>
  <h2>Diese Seite existiert leider nicht.</h2>
  <p>Vielleicht ist der Link veraltet oder du hast dich vertippt. Hier geht's zurück:</p>
  <div class="btn-row">
    <a href="/" class="btn btn-orange">Zur Startseite →</a>
    <a href="/booking.html" class="btn btn-ghost">Direkt buchen</a>
  </div>
</body>
</html>
